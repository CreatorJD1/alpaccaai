<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Alpecca — layer cutter</title>
<!--
  Her in-app layer cutter: build her per-part rig from HER OWN art, by hand, with
  no GPU. Load her art, optionally let Hugging Face remove the background to a
  clean transparent figure, then paint + name each rig layer (back hair, body,
  head, brows, eyes, mouth, front hair, accessory). "Build her rig" posts the
  cut transparent PNGs to /rig/import, which writes data/avatar/rig/ + rig.json
  (seeded with her real skeleton) -- after which /live2d and the 3D home rig tier
  animate her real parts (blink, lip-sync, head-turn, hair sway). Only her art is
  ever used; nothing is invented or substituted.
-->
<link rel="stylesheet" href="/web/app.css" />
<script src="/web/glow.js"></script>
<style>
  * { box-sizing:border-box; }
  body { margin:0; font-family:var(--font); background:radial-gradient(1200px 800px at 50% -10%, #0c1426, var(--bg));
         color:var(--ink); min-height:100vh; }
  header { display:flex; align-items:center; gap:12px; padding:12px 16px; border-bottom:1px solid var(--line); flex-wrap:wrap; }
  header .core-emblem.breathe { }
  header h1 { margin:0; font-size:16px; font-weight:650; }
  header .sub { color:var(--dim); font-size:12px; }
  header a { color:var(--mood); font-size:12px; text-decoration:none; margin-left:auto; }
  .bar { display:flex; gap:8px; align-items:center; flex-wrap:wrap; padding:10px 16px; border-bottom:1px solid var(--line); }
  .wrap { display:grid; grid-template-columns:1fr 320px; gap:14px; padding:14px 16px; align-items:start; }
  @media (max-width:820px){ .wrap { grid-template-columns:1fr; } }
  .stage { position:relative; background:var(--bg-2); border:1px solid var(--line); border-radius:14px;
           display:flex; align-items:center; justify-content:center; min-height:340px; overflow:hidden; }
  #view { touch-action:none; cursor:crosshair; max-width:100%; image-rendering:auto;
          background:repeating-conic-gradient(#0e1830 0% 25%, #0a1422 0% 50%) 50% / 22px 22px; border-radius:10px; }
  .side { display:flex; flex-direction:column; gap:12px; }
  .card { background:var(--panel-solid); border:1px solid var(--line); border-radius:14px; padding:12px 14px; }
  .card h3 { margin:0 0 8px; font-size:12px; letter-spacing:.08em; text-transform:uppercase; color:var(--dim); font-weight:650; }
  .row { display:flex; gap:8px; align-items:center; margin:6px 0; }
  .lyr { border:1px solid var(--line); border-radius:10px; padding:8px; margin:7px 0; background:var(--bg-2); }
  .lyr.active { border-color:var(--mood); box-shadow:var(--glow-ring); }
  .lyr .top { display:flex; gap:6px; align-items:center; }
  .lyr input[type=text] { flex:1; background:var(--bg); border:1px solid var(--line); color:var(--ink);
                          border-radius:7px; padding:5px 8px; font-size:12px; }
  .lyr select { background:var(--bg); border:1px solid var(--line); color:var(--ink); border-radius:7px; padding:5px; font-size:12px; }
  .lyr .meta { color:var(--dim); font-size:10.5px; margin-top:4px; display:flex; gap:8px; flex-wrap:wrap; }
  .lyr .meta b { color:var(--ink); }
  .swatch { width:12px; height:12px; border-radius:3px; display:inline-block; }
  label.k { color:var(--dim); font-size:12px; }
  input[type=range]{ accent-color:var(--mood); }
  .status { color:var(--dim); font-size:12px; }
  .status.err { color:var(--alert); } .status.ok { color:var(--ok); }
  .hint { color:var(--dim); font-size:11.5px; line-height:1.5; }
  input[type=file]{ font-size:12px; color:var(--dim); }
</style>
</head>
<body>
  <header>
    <span class="core-emblem breathe"></span>
    <div><h1>Layer cutter</h1><div class="sub">build her per-part rig from her own art — no GPU</div></div>
    <a href="/">← back</a>
  </header>

  <div class="bar">
    <button class="glow-btn" id="loadSrc" style="padding:8px 14px">Load her source art</button>
    <label class="ghost-btn" style="padding:8px 12px;cursor:pointer">Upload art<input id="file" type="file" accept="image/*" style="display:none"></label>
    <button class="ghost-btn" id="hfMatte" style="padding:8px 12px" disabled>✦ Remove background (Hugging Face)</button>
    <span style="flex:1"></span>
    <button class="glow-btn" id="build" style="padding:8px 16px" disabled>Build her rig →</button>
    <span class="status" id="status">load her art to begin</span>
  </div>

  <div class="wrap">
    <div class="stage"><canvas id="view"></canvas></div>
    <div class="side">
      <div class="card">
        <h3>Brush</h3>
        <div class="row"><label class="k" style="width:54px">size</label>
          <input type="range" id="brush" min="4" max="120" value="34" style="flex:1"><span id="brushV" class="status">34</span></div>
        <div class="row">
          <button class="ghost-btn" id="erase" style="padding:6px 12px">Erase</button>
          <button class="ghost-btn" id="clearL" style="padding:6px 12px">Clear layer</button>
          <button class="ghost-btn on" id="showMask" style="padding:6px 12px">Show mask</button>
        </div>
        <div class="hint">Pick a layer, then paint over the part of her that belongs to it. The checkerboard shows transparency. Edges can be rough — overlap is fine; back layers sit behind front ones.</div>
      </div>
      <div class="card">
        <h3>Her rig layers</h3>
        <div id="layers"></div>
        <button class="ghost-btn" id="addL" style="padding:6px 12px;margin-top:4px">+ Add layer</button>
      </div>
    </div>
  </div>

<script>
const $ = id => document.getElementById(id);
const ROLES = ["back_hair","body","head","brows","eyes","mouth","front_hair","accessory"];
const ROLE_COLOR = { back_hair:"#caa86a", body:"#7fd9ff", head:"#ffd27a", brows:"#ff9ec4",
  eyes:"#48e08a", mouth:"#ff5d7f", front_hair:"#e6c98a", accessory:"#c9a8ff" };

let base = null;            // HTMLImageElement (her art, possibly bg-removed)
let natW = 0, natH = 0;     // her art's native pixel size (the rig canvas size)
let scale = 1;              // view px per native px
let layers = [];            // {name, role, mask(canvas), ctx}
let active = 0;
let erasing = false, showMask = true, painting = false;

const view = $("view"), vctx = view.getContext("2d");

function newLayer(role, name){
  const mask = document.createElement("canvas"); mask.width = natW||1; mask.height = natH||1;
  return { name: name || role, role, mask, ctx: mask.getContext("2d") };
}
function seedLayers(){
  layers = ROLES.map(r => newLayer(r));
  active = 0; renderLayers();
}
function resizeMasksToArt(){
  layers.forEach(L => {
    const m = document.createElement("canvas"); m.width = natW; m.height = natH;
    m.getContext("2d").drawImage(L.mask, 0, 0, natW, natH);
    L.mask = m; L.ctx = m.getContext("2d");
  });
}

function fitView(){
  if(!natW) return;
  const maxW = Math.min(620, view.parentElement.clientWidth - 4) || 560;
  const maxH = 560;
  scale = Math.min(maxW/natW, maxH/natH, 1.4);
  view.width = Math.round(natW*scale); view.height = Math.round(natH*scale);
  redraw();
}
function redraw(){
  vctx.clearRect(0,0,view.width,view.height);
  if(base) vctx.drawImage(base, 0,0, view.width, view.height);
  if(showMask && layers[active]){
    const L = layers[active];
    vctx.save(); vctx.globalAlpha = 0.5;
    vctx.globalCompositeOperation = "source-over";
    // tint the painted mask in the layer's colour
    const tint = document.createElement("canvas"); tint.width=L.mask.width; tint.height=L.mask.height;
    const tc = tint.getContext("2d");
    tc.drawImage(L.mask,0,0); tc.globalCompositeOperation="source-in";
    tc.fillStyle = ROLE_COLOR[L.role] || "#7fd9ff"; tc.fillRect(0,0,tint.width,tint.height);
    vctx.drawImage(tint, 0,0, view.width, view.height);
    vctx.restore();
  }
}

function loadImg(img){
  base = img; natW = img.naturalWidth || img.width; natH = img.naturalHeight || img.height;
  if(layers.length) resizeMasksToArt(); else seedLayers();
  $("build").disabled = false; $("hfMatte").disabled = false;
  setStatus(`her art: ${natW}×${natH}. Paint each layer, then Build.`);
  fitView();
}
function setStatus(t, cls){ const s=$("status"); s.textContent=t; s.className="status"+(cls?" "+cls:""); }

// ---- painting ----
function evtPos(e){
  const r = view.getBoundingClientRect();
  const x = ((e.touches?e.touches[0].clientX:e.clientX) - r.left) / scale;
  const y = ((e.touches?e.touches[0].clientY:e.clientY) - r.top) / scale;
  return { x, y };
}
function paintAt(p){
  const L = layers[active]; if(!L) return;
  const rad = (+$("brush").value) / 2;
  L.ctx.save();
  L.ctx.globalCompositeOperation = erasing ? "destination-out" : "source-over";
  L.ctx.fillStyle = "rgba(255,255,255,1)";
  L.ctx.beginPath(); L.ctx.arc(p.x, p.y, rad, 0, Math.PI*2); L.ctx.fill();
  L.ctx.restore();
  redraw();
}
function start(e){ if(!base) return; e.preventDefault(); painting=true; paintAt(evtPos(e)); }
function move(e){ if(painting){ e.preventDefault(); paintAt(evtPos(e)); } }
function end(){ painting=false; }
view.addEventListener("mousedown", start); view.addEventListener("mousemove", move);
addEventListener("mouseup", end);
view.addEventListener("touchstart", start, {passive:false});
view.addEventListener("touchmove", move, {passive:false});
view.addEventListener("touchend", end);

// ---- layers panel ----
function renderLayers(){
  const box = $("layers"); box.innerHTML = "";
  layers.forEach((L, i) => {
    const el = document.createElement("div"); el.className = "lyr"+(i===active?" active":"");
    el.onclick = (e)=>{ if(e.target.tagName==="INPUT"||e.target.tagName==="SELECT"||e.target.tagName==="BUTTON") return;
      active=i; renderLayers(); redraw(); };
    const sw = `<span class="swatch" style="background:${ROLE_COLOR[L.role]||'#7fd9ff'}"></span>`;
    el.innerHTML =
      `<div class="top">${sw}<input type="text" value="${L.name.replace(/"/g,'&quot;')}" data-i="${i}" class="nm"/>`+
      `<select class="rl" data-i="${i}">${ROLES.map(r=>`<option ${r===L.role?'selected':''}>${r}</option>`).join("")}</select>`+
      `<button class="ghost-btn del" data-i="${i}" style="padding:3px 8px">✕</button></div>`+
      `<div class="meta"><span>z-order: <b>${ROLES.indexOf(L.role)}</b></span>`+
      `<span>${i===active?'painting this':'click to edit'}</span></div>`;
    box.appendChild(el);
  });
  box.querySelectorAll("input.nm").forEach(inp => inp.oninput = e=>{ layers[+e.target.dataset.i].name = e.target.value; });
  box.querySelectorAll("select.rl").forEach(sel => sel.onchange = e=>{ layers[+e.target.dataset.i].role = e.target.value; renderLayers(); redraw(); });
  box.querySelectorAll("button.del").forEach(b => b.onclick = e=>{ const i=+e.target.dataset.i;
    layers.splice(i,1); if(active>=layers.length) active=Math.max(0,layers.length-1); renderLayers(); redraw(); });
}
$("addL").onclick = ()=>{ layers.push(newLayer("accessory","layer "+(layers.length+1))); active=layers.length-1; renderLayers(); redraw(); };

// ---- controls ----
$("brush").oninput = e=> $("brushV").textContent = e.target.value;
$("erase").onclick = e=>{ erasing=!erasing; e.target.classList.toggle("on",erasing); };
$("showMask").onclick = e=>{ showMask=!showMask; e.target.classList.toggle("on",showMask); redraw(); };
$("clearL").onclick = ()=>{ const L=layers[active]; if(L){ L.ctx.clearRect(0,0,L.mask.width,L.mask.height); redraw(); } };

$("loadSrc").onclick = ()=>{
  setStatus("loading her source art…");
  const img = new Image(); img.crossOrigin="anonymous";
  img.onload = ()=> loadImg(img);
  img.onerror = ()=> setStatus("no source art found — upload her art instead", "err");
  img.src = "/avatar/source?t="+Date.now();
};
$("file").onchange = e=>{
  const f = e.target.files[0]; if(!f) return;
  const img = new Image(); img.onload = ()=>{ loadImg(img); URL.revokeObjectURL(img.src); };
  img.src = URL.createObjectURL(f);
};

// ---- HF background removal: clean her figure to transparent, on HF's GPU ----
$("hfMatte").onclick = async ()=>{
  if(!base) return;
  setStatus("asking Hugging Face to remove the background…");
  $("hfMatte").disabled = true;
  try{
    const c = document.createElement("canvas"); c.width=natW; c.height=natH;
    c.getContext("2d").drawImage(base,0,0);
    const data = c.toDataURL("image/png");
    const r = await fetch("/rig/hf_matte",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({data})});
    const d = await r.json();
    if(d.ok && d.data){ const img=new Image(); img.onload=()=>{ loadImg(img);
        setStatus("background removed by Hugging Face — paint her layers now","ok"); }; img.src=d.data; }
    else setStatus("HF background removal unavailable ("+(d.error||"")+") — paint over her art directly","err");
  }catch(e){ setStatus("HF request failed — paint over her art directly","err"); }
  $("hfMatte").disabled = false;
};

// ---- cut a layer: her art kept only where the mask is painted ----
function cutLayer(L){
  const c = document.createElement("canvas"); c.width=natW; c.height=natH;
  const ctx = c.getContext("2d");
  ctx.drawImage(base,0,0,natW,natH);
  ctx.globalCompositeOperation = "destination-in";
  ctx.drawImage(L.mask,0,0,natW,natH);
  return c;
}
function hasPaint(L){
  const d = L.ctx.getImageData(0,0,L.mask.width,L.mask.height).data;
  for(let i=3;i<d.length;i+=4){ if(d[i]>8) return true; }   // any alpha painted
  return false;
}

$("build").onclick = async ()=>{
  if(!base) return;
  const painted = layers.filter(hasPaint);
  if(!painted.length){ setStatus("paint at least one layer first","err"); return; }
  setStatus("building her rig from "+painted.length+" layers…");
  $("build").disabled = true;
  const payload = { width:natW, height:natH, layers: painted.map(L=>({
    name:L.name, role:L.role, data: cutLayer(L).toDataURL("image/png") })) };
  try{
    const r = await fetch("/rig/import",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
    const d = await r.json();
    if(d.ok){ setStatus("✓ built her rig: "+d.count+" layers ("+(d.roles||[]).join(", ")+"). Open /live2d to see her rigged.","ok"); }
    else setStatus("couldn't build: "+(d.error||"unknown"),"err");
  }catch(e){ setStatus("build request failed","err"); }
  $("build").disabled = false;
};

function pollMood(){ fetch("/state",{cache:"no-store"}).then(r=>r.json()).then(d=>{ const s=d.state||{};
  if(window.applyMood) applyMood({warmth:s.love,unease:s.fear,curiosity:s.curiosity,glow:s.energy}); }).catch(()=>{}); }
pollMood(); setInterval(pollMood, 6000);
addEventListener("resize", fitView);
</script>
</body>
</html>
