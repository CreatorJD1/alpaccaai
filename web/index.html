<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Alpecca</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root { --bg:#1a1726; --panel:#241f33; --ink:#efe9ff; --muted:#9b91b8; --accent:#c9a8ff; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
         background: radial-gradient(1200px 800px at 50% -10%, #2c2540, var(--bg));
         color: var(--ink); min-height:100vh; display:flex; flex-direction:column; align-items:center; }
  header { text-align:center; padding:16px 0 4px; }
  header h1 { margin:0; font-weight:600; letter-spacing:.5px; }
  header .mood { color:var(--muted); font-size:13px; margin-top:2px; }
  #conn { font-size:12px; margin-top:6px; color:#ffcaa8; max-width:520px; line-height:1.4; }
  #conn code { background:#3a2f55; padding:1px 6px; border-radius:5px; color:#efe9ff; }
  #conn.ok { display:none; }

  .stage { display:flex; flex-direction:column; align-items:center; gap:8px; }
  #avatar { filter: drop-shadow(0 12px 34px rgba(0,0,0,.5)); }
  /* Custom-art video avatar (data/avatar/*.mp4) -- hidden until clips exist. */
  #avatarVideo { display:none; width:220px; height:240px; object-fit:cover;
                 border-radius:24px; filter: drop-shadow(0 12px 34px rgba(0,0,0,.5)); }
  /* Her real still character art (data/avatar/portraits/*.png), one per state. */
  #avatarPortrait { display:none; width:230px; height:270px; object-fit:contain;
                    border-radius:22px;
                    background:radial-gradient(130px 130px at 50% 42%, #2c2540, transparent);
                    filter: drop-shadow(0 12px 34px rgba(0,0,0,.5)); transition:opacity .25s; }
  /* Listening: a soft attention ring around whichever avatar is showing. */
  .stage.listening #avatar, .stage.listening #avatarVideo, .stage.listening #avatarPortrait {
    filter: drop-shadow(0 12px 34px rgba(0,0,0,.5)) drop-shadow(0 0 18px rgba(201,168,255,.55)); }
  /* Thinking: a little thought bubble over the SVG. */
  #thoughtDots { opacity:0; transition:opacity .3s; }
  .stage.thinking #thoughtDots { opacity:1; }

  /* Alpecca's own note about how she's chosen to look (she decides, not you) */
  .lookNote { max-width:300px; text-align:center; font-size:11.5px; color:var(--muted);
              font-style:italic; line-height:1.4; min-height:16px; }

  .bars { display:flex; gap:14px; margin-top:2px; font-size:11px; color:var(--muted); }
  .bar { display:flex; flex-direction:column; align-items:center; gap:3px; }
  .bar .track { width:64px; height:5px; border-radius:3px; background:#3a3350; overflow:hidden; }
  .bar .fill { height:100%; width:0; border-radius:3px; transition:width .8s ease; }

  #chat { width:min(640px,94vw); height:46vh; min-height:280px; display:flex; flex-direction:column;
          background:var(--panel); border-radius:16px; margin:14px 0; overflow:hidden;
          box-shadow:0 10px 40px rgba(0,0,0,.4); }
  #log { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; }
  .msg { max-width:78%; padding:9px 13px; border-radius:14px; line-height:1.4; font-size:14px; }
  .me { align-self:flex-end; background:#3b2f63; }
  .her { align-self:flex-start; background:#2f2a44; border:1px solid #3d3658; }
  .mem { align-self:flex-start; font-size:11px; color:var(--muted); font-style:italic; padding:0 6px; }
  .introspect { align-self:center; max-width:88%; font-size:12.5px; color:#d9ccff;
                background:#2a2342; border:1px dashed #4a3f70; border-radius:12px;
                padding:9px 13px; line-height:1.45; }
  .introspect b { color:var(--accent); font-weight:600; }
  .proactive { align-self:flex-start; background:#2f2a44; border:1px solid #5a4a8a;
               box-shadow:0 0 12px rgba(201,168,255,.15); }
  .msg img { max-width:100%; border-radius:10px; display:block; margin-top:6px; }
  #attachChip { display:none; font-size:11px; color:var(--accent); padding:0 12px 6px; }
  form { display:flex; gap:8px; padding:12px; border-top:1px solid #332c4a; }
  input { flex:1; background:#1d1a2b; border:1px solid #3a3350; color:var(--ink);
          padding:11px 13px; border-radius:10px; font-size:14px; outline:none; }
  input:focus { border-color:var(--accent); }
  button { background:var(--accent); color:#221a33; border:0; padding:0 18px;
           border-radius:10px; font-weight:600; cursor:pointer; }
  .status { font-size:11px; color:var(--muted); padding:0 12px 8px; }

  .chartwrap { width:min(640px,94vw); background:var(--panel); border-radius:16px;
               padding:12px 14px; margin-bottom:24px; box-shadow:0 8px 28px rgba(0,0,0,.35); }
  .chartwrap h3 { margin:2px 0 8px; font-size:13px; font-weight:600; color:var(--muted); }
</style>
</head>
<body>
  <header>
    <h1>Alpecca</h1>
    <div class="mood" id="moodLabel">connecting…</div>
    <div id="conn"></div>
  </header>

  <div class="stage" id="stage">
    <!-- Custom character art: looping clips from data/avatar/, switched by
         avatar state. Hidden unless clips exist (see /avatar/manifest). -->
    <video id="avatarVideo" autoplay loop muted playsinline></video>
    <!-- Her real still character art, one pose per state (portrait mode). -->
    <img id="avatarPortrait" alt="Alpecca" />
    <a href="/studio" style="font-size:12px;color:var(--accent);text-decoration:none;">✦ her studio</a>
    <!-- A character avatar (Replika-style customizable companion). Idle
         breathing + blinking run on a clock; mood drives the expression. -->
    <svg id="avatar" width="220" height="240" viewBox="0 0 220 240" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="cheek" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#ff9ec4"/><stop offset="100%" stop-color="#ff9ec4" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <g id="bob">
        <!-- body -->
        <ellipse id="body" cx="110" cy="196" rx="56" ry="40" fill="#c9a8ff"/>
        <!-- accessory: scarf (behind head) -->
        <path id="scarf" d="M70 168 q40 22 80 0 l-6 16 q-34 16 -68 0 z" fill="#7ad1c0" opacity="0" />
        <!-- neck -->
        <rect x="98" y="150" width="24" height="26" rx="10" fill="#c9a8ff"/>
        <!-- head group (breathes/sways) -->
        <g id="head">
          <!-- ears (alpaca-ish) -->
          <ellipse id="earL" cx="80" cy="58" rx="12" ry="24" fill="#c9a8ff"/>
          <ellipse id="earR" cx="140" cy="58" rx="12" ry="24" fill="#c9a8ff"/>
          <!-- face -->
          <ellipse id="face" cx="110" cy="98" rx="52" ry="50" fill="#c9a8ff"/>
          <!-- accessory: flower on ear -->
          <g id="flower" opacity="0">
            <circle cx="150" cy="62" r="6" fill="#ffd27a"/>
            <g fill="#ff9ec4">
              <circle cx="150" cy="53" r="5"/><circle cx="159" cy="62" r="5"/>
              <circle cx="150" cy="71" r="5"/><circle cx="141" cy="62" r="5"/>
            </g>
          </g>
          <!-- cheeks (warmth) -->
          <circle id="cheekL" cx="84" cy="110" r="13" fill="url(#cheek)" opacity="0"/>
          <circle id="cheekR" cx="136" cy="110" r="13" fill="url(#cheek)" opacity="0"/>
          <!-- brows -->
          <g stroke="#3a2f55" stroke-width="4" stroke-linecap="round">
            <line id="browL" x1="80" y1="78" x2="100" y2="78"/>
            <line id="browR" x1="120" y1="78" x2="140" y2="78"/>
          </g>
          <!-- eyes (scaleY animates for blink) -->
          <g fill="#3a2f55">
            <ellipse id="eyeL" cx="90" cy="96" rx="8" ry="9"/>
            <ellipse id="eyeR" cx="130" cy="96" rx="8" ry="9"/>
          </g>
          <!-- accessory: glasses -->
          <g id="glasses" opacity="0" stroke="#3a2f55" stroke-width="3" fill="none">
            <circle cx="90" cy="96" r="14"/><circle cx="130" cy="96" r="14"/>
            <line x1="104" y1="96" x2="116" y2="96"/>
          </g>
          <!-- mouth -->
          <path id="mouth" d="M92 122 Q110 134 128 122" stroke="#3a2f55"
                stroke-width="4" fill="none" stroke-linecap="round"/>
          <!-- thought bubble (thinking state) -->
          <g id="thoughtDots" fill="#9b91b8">
            <circle cx="166" cy="46" r="3"/>
            <circle cx="176" cy="36" r="4.5"/>
            <circle cx="189" cy="24" r="6"/>
          </g>
        </g>
      </g>
    </svg>

    <div class="lookNote" id="lookNote"></div>

    <div class="bars">
      <div class="bar">warmth<div class="track"><div class="fill" id="fLove" style="background:#ff9ec4"></div></div></div>
      <div class="bar">care<div class="track"><div class="fill" id="fComp" style="background:#9ad7ff"></div></div></div>
      <div class="bar">unease<div class="track"><div class="fill" id="fFear" style="background:#ffd27a"></div></div></div>
    </div>
  </div>

  <div id="chat">
    <div id="log"></div>
    <div class="status" id="status"></div>
    <div id="attachChip"></div>
    <form id="form">
      <input id="input" placeholder="Say something to Alpecca…" autocomplete="off" />
      <input type="file" id="imageFile" accept="image/*" style="display:none" />
      <button type="button" id="micBtn" title="Hold a conversation by voice — click to talk, click again to send"
              style="background:#3a3158;color:var(--ink);padding:0 12px;">🎤</button>
      <button type="button" id="speakBtn" title="Toggle Alpecca speaking her replies aloud"
              style="background:#3a3158;color:var(--ink);padding:0 12px;">🔇</button>
      <button type="button" id="attachBtn" title="Show Alpecca an image"
              style="background:#3a3158;color:var(--ink);padding:0 12px;">📎</button>
      <button type="button" id="camBtn" title="Show Alpecca something through your camera"
              style="background:#3a3158;color:var(--ink);padding:0 12px;">📷</button>
      <button type="button" id="introspectBtn" title="Ask Alpecca to examine its own state"
              style="background:#3a3158;color:var(--ink);padding:0 12px;">self?</button>
      <button type="submit">Send</button>
    </form>
  </div>

  <!-- Camera mode: a live preview so you can frame what you're showing her. -->
  <div id="camOverlay" style="display:none; position:fixed; inset:0; z-index:50;
       background:rgba(20,16,32,.85); align-items:center; justify-content:center;
       flex-direction:column; gap:12px;">
    <video id="camVideo" autoplay playsinline
           style="max-width:min(640px,92vw); border-radius:14px;
                  box-shadow:0 16px 60px rgba(0,0,0,.6);"></video>
    <div style="display:flex; gap:10px;">
      <button type="button" id="camSnap"
              style="background:var(--accent);color:#221a33;border:0;
                     padding:10px 22px;border-radius:10px;font-weight:600;cursor:pointer;">
        Show her</button>
      <button type="button" id="camCancel"
              style="background:#3a3158;color:var(--ink);border:0;
                     padding:10px 22px;border-radius:10px;cursor:pointer;">Cancel</button>
    </div>
  </div>

  <div class="chartwrap">
    <h3>Alpecca's emotional life</h3>
    <canvas id="moodChart" height="120"></canvas>
  </div>

<script>
const log = document.getElementById('log');
const statusEl = document.getElementById('status');
const moodLabel = document.getElementById('moodLabel');
let current = {love:0.4, compassion:0.2, fear:0.0};
let currentMood = '';        // tracked so the blink redraw doesn't corrupt the label
let lastAppearance = null;

function addMsg(text, cls){
  const d = document.createElement('div');
  d.className = 'msg ' + cls; d.textContent = text;
  log.appendChild(d); log.scrollTop = log.scrollHeight;
}
function addMem(items){
  if(!items || !items.length) return;
  const d = document.createElement('div');
  d.className = 'mem'; d.textContent = '…remembering: ' + items.join('  •  ');
  log.appendChild(d); log.scrollTop = log.scrollHeight;
}

// --- avatar: render Alpecca's SELF-CHOSEN look + mood ----------------------
// Appearance comes from the server (she decides it). The UI only displays it.
function applyAppearance(app){
  if(!app) return;
  const c = app.color;
  ['body','earL','earR','face'].forEach(id=>document.getElementById(id).setAttribute('fill', c));
  document.querySelector('#bob rect').setAttribute('fill', c);
  ['scarf','glasses','flower'].forEach(a=>
    document.getElementById(a).setAttribute('opacity',
      (app.accessories||[]).includes(a) ? 1 : 0));
  if(app.note) document.getElementById('lookNote').textContent = '“' + app.note + '”';
}

function render(state, mood, appearance){
  current = state;
  if(mood){ currentMood = mood; if(typeof moodSequence === 'function') moodSequence(mood); }
  if(appearance){ lastAppearance = appearance; applyAppearance(appearance); }
  const {love, compassion, fear} = state;
  document.getElementById('fLove').style.width = (love*100)+'%';
  document.getElementById('fComp').style.width = (compassion*100)+'%';
  document.getElementById('fFear').style.width = (fear*100)+'%';
  if(currentMood) moodLabel.textContent = 'feeling ' + currentMood;

  // mouth: smile rises with warmth, falls with unease
  const smile = Math.max(-8, Math.min(18, (love-0.4)*32 - fear*22));
  document.getElementById('mouth').setAttribute('d', `M92 122 Q110 ${122+smile} 128 122`);
  // brows lift inward when uneasy
  const lift = fear*9;
  document.getElementById('browL').setAttribute('y1', 78-lift);
  document.getElementById('browR').setAttribute('y1', 78-lift);
  // eyes soften (narrow) with care
  const ry = 9 - compassion*3.5;
  document.getElementById('eyeL').setAttribute('ry', ry);
  document.getElementById('eyeR').setAttribute('ry', ry);
  // cheeks blush with warmth
  const blush = Math.max(0, (love-0.45)*1.8);
  document.getElementById('cheekL').setAttribute('opacity', blush);
  document.getElementById('cheekR').setAttribute('opacity', blush);
}

// --- idle life: breathing, sway, blinking ---------------------------------
let t = 0;
function idle(){
  t += 0.05;
  const breathe = 1 + Math.sin(t)*0.012;
  const sway = Math.sin(t*0.6)*2;
  document.getElementById('bob').setAttribute(
    'transform', `translate(${sway} ${Math.sin(t)*1.5}) scale(${breathe})`);
  // anxiety makes the sway a touch quicker/jitterier
  requestAnimationFrame(idle);
}
idle();
function blink(){
  const eyes = [document.getElementById('eyeL'), document.getElementById('eyeR')];
  eyes.forEach(e=>e.setAttribute('ry', 1));
  setTimeout(()=>render(current, currentMood, lastAppearance), 120);
  // next blink in 2.5–6s; more often when uneasy
  setTimeout(blink, 2500 + Math.random()*3500 * (1 - current.fear*0.5));
}
setTimeout(blink, 3000);

// --- mood history chart ----------------------------------------------------
let chart;
async function refreshChart(){
  try {
    const r = await fetch('/history?limit=120'); const d = await r.json();
    const h = d.history || [];
    const labels = h.map(p=> new Date(p.ts*1000).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}));
    const mk = (key,color)=>({label:key, data:h.map(p=>p[key]), borderColor:color,
      backgroundColor:color+'22', tension:0.35, pointRadius:0, borderWidth:2, fill:true});
    const data = {labels, datasets:[mk('love','#ff9ec4'), mk('compassion','#9ad7ff'), mk('fear','#ffd27a')]};
    if(!chart){
      chart = new Chart(document.getElementById('moodChart'), {type:'line', data,
        options:{responsive:true, animation:false, scales:{
          y:{min:0,max:1,ticks:{color:'#9b91b8'},grid:{color:'#332c4a'}},
          x:{ticks:{color:'#9b91b8',maxTicksLimit:6},grid:{display:false}}},
          plugins:{legend:{labels:{color:'#cfc6e6',boxWidth:12}}}}});
    } else { chart.data = data; chart.update(); }
  } catch(e){ /* offline */ }
}

// --- websocket + polling ---------------------------------------------------
const connEl = document.getElementById('conn');
function setConn(msg){ if(!msg){ connEl.className='ok'; connEl.innerHTML=''; }
  else { connEl.className=''; connEl.innerHTML=msg; } }

// If the page was opened as a file (double-clicked), there's no server to talk
// to. This is the most common reason Alpecca seems "stuck". Say so plainly.
if(location.protocol === 'file:'){
  moodLabel.textContent = 'not connected';
  setConn("You opened this file directly. Alpecca needs her server running. In a terminal run <code>python server.py</code>, then open <code>http://127.0.0.1:8765</code> in your browser.");
}

let ws, wsTries = 0;
function connect(){
  if(location.protocol === 'file:') return;   // nothing to connect to
  ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onopen = ()=>{ wsTries = 0; setConn(''); };
  ws.onmessage = (ev)=>{
    const m = JSON.parse(ev.data);
    if(m.type === 'state'){
      render(m.state, m.mood, m.appearance);
      if(typeof playSequence === 'function' && !window.__greeted){ window.__greeted = true; playSequence('greet', 1600); }
      statusEl.textContent = m.llm_online ? '' : 'Ollama offline — replies are stubbed. Start Ollama for real conversation.';
    } else if(m.type === 'reply'){
      addMem(m.memories_used); addMsg(m.reply, 'her'); speak(m.reply);
      render(m.state, m.mood, m.appearance); refreshChart();
    } else if(m.type === 'proactive'){
      // She chose to speak on her own -- style it softly distinct.
      const d = document.createElement('div');
      d.className = 'msg her proactive'; d.textContent = m.reply;
      log.appendChild(d); log.scrollTop = log.scrollHeight;
      speak(m.reply);
      render(m.state, m.mood, m.appearance); refreshChart();
    } else if(m.type === 'computer_status'){
      const d = document.createElement('div');
      d.className = 'mem'; d.textContent = '🖥️ ' + m.text;
      log.appendChild(d); log.scrollTop = log.scrollHeight;
    } else if(m.type === 'computer_confirm'){
      showComputerConfirm(m);
    } else if(m.type === 'computer_done'){
      const d = document.createElement('div');
      d.className = 'msg her';
      d.textContent = m.ok ? ('Done — ' + (m.summary || 'finished.'))
                           : ('I stopped: ' + (m.error || m.summary || 'unable to finish.'));
      log.appendChild(d); log.scrollTop = log.scrollHeight;
      setAvatarState('idle');
    }
  };
  ws.onclose = ()=>{
    wsTries++;
    moodLabel.textContent = 'reconnecting…';
    if(wsTries >= 2)
      setConn("Can't reach Alpecca. Is her server running? Start it with <code>python server.py</code> and open <code>http://127.0.0.1:8765</code>.");
    setTimeout(connect, 1500);
  };
  ws.onerror = ()=>{ try{ ws.close(); }catch(e){} };
}
connect();

// Poll state so background mood-drift shows on the avatar even when idle.
setInterval(async ()=>{
  try { const r = await fetch('/state'); const d = await r.json(); render(d.state, d.mood, d.appearance); }
  catch(e){}
}, 5000);
refreshChart();
setInterval(refreshChart, 15000);

// Self-awareness: Alpecca reads and reports its own real state.
document.getElementById('introspectBtn').addEventListener('click', async ()=>{
  try {
    const r = await fetch('/introspect'); const d = await r.json();
    const box = document.createElement('div'); box.className = 'introspect';
    box.innerHTML = '<b>Alpecca looks inward.</b> ' + d.narration;
    log.appendChild(box); log.scrollTop = log.scrollHeight;
    render(d.state, d.mood);
  } catch(err){}
});

// --- letting her use the computer (opt-in; consequential steps need an OK) -----
// A confirmation overlay she raises before anything consequential. Reuses the
// camera overlay's styling language.
function showComputerConfirm(m){
  setAvatarState('thinking');
  let ov = document.getElementById('cuOverlay');
  if(!ov){
    ov = document.createElement('div');
    ov.id = 'cuOverlay';
    ov.style = 'display:flex;position:fixed;inset:0;z-index:60;background:rgba(20,16,32,.88);'+
               'align-items:center;justify-content:center;flex-direction:column;gap:14px;padding:20px;';
    ov.innerHTML = '<div style="max-width:460px;background:#241f33;border:1px solid #5a4a8a;'+
      'border-radius:14px;padding:20px;color:#efe9ff;line-height:1.5;">'+
      '<div style="font-weight:600;margin-bottom:8px;color:#c9a8ff;">She wants to do something that matters — OK?</div>'+
      '<div id="cuMsg" style="font-size:14px;"></div></div>'+
      '<div style="display:flex;gap:10px;"><button id="cuYes" style="background:#c9a8ff;color:#221a33;'+
      'border:0;padding:10px 22px;border-radius:10px;font-weight:600;cursor:pointer;">Yes, do it</button>'+
      '<button id="cuNo" style="background:#7a3a5a;color:#efe9ff;border:0;padding:10px 22px;'+
      'border-radius:10px;cursor:pointer;">No, stop</button></div>';
    document.body.appendChild(ov);
    const answer = (ok)=>{ ov.style.display='none';
      fetch('/computer/confirm', {method:'POST', headers:{'content-type':'application/json'},
        body: JSON.stringify({approved: ok})}); };
    document.getElementById('cuYes').onclick = ()=> answer(true);
    document.getElementById('cuNo').onclick = ()=> answer(false);
  }
  document.getElementById('cuMsg').textContent =
    `${m.kind}${m.target ? ' — ' + m.target : ''}${m.text ? ' ("' + m.text + '")' : ''}` +
    (m.reason ? `\nWhy: ${m.reason}` : '');
  ov.style.display = 'flex';
}

// --- avatar state machine: idle / listening / thinking / speaking -------------
// One source of truth for "what is she doing right now". The SVG animates the
// states by default; when custom clips exist (data/avatar/*.mp4) the video
// avatar takes over, switched by the same states -- so her real character art
// drops in without touching any of this logic.
const stage = document.getElementById('stage');
const avatarVideo = document.getElementById('avatarVideo');
const avatarPortrait = document.getElementById('avatarPortrait');
let avatarState = 'idle';
let videoClips = null;          // /avatar/manifest result for video mode, or null
let portraitClips = null;       // /avatar/manifest result for portrait mode, or null
let mouthTimer = null;

function clipForState(s){
  if(!videoClips) return null;
  const want = {idle:'standby', listening:'listening', thinking:'thinking', speaking:'speaking'}[s];
  const have = videoClips.clips[want] ? want :
               (videoClips.clips.standby ? 'standby' : null);
  return have ? `/avatar/clip/${have}` : null;
}

function portraitForState(s){
  if(!portraitClips) return null;
  // Fall back to idle for any state that has no dedicated pose.
  const have = portraitClips.portraits[s] ? s :
               (portraitClips.portraits.idle ? 'idle' : null);
  return have ? `/avatar/portrait/${have}` : null;
}

function setAvatarState(s){
  if(s === avatarState) return;
  avatarState = s;
  stage.classList.toggle('listening', s === 'listening');
  stage.classList.toggle('thinking', s === 'thinking');

  // Video mode: swap the loop, with a poster of the current frame so the
  // transition never flashes black (Alice's frame-capture trick).
  const clip = clipForState(s);
  if(clip && !avatarVideo.src.endsWith(clip)){
    try {
      const c = document.createElement('canvas');
      c.width = avatarVideo.videoWidth || 220; c.height = avatarVideo.videoHeight || 240;
      c.getContext('2d').drawImage(avatarVideo, 0, 0, c.width, c.height);
      avatarVideo.poster = c.toDataURL('image/jpeg', 0.7);
    } catch(e){}
    avatarVideo.src = clip;
  }

  // Portrait mode: swap the still pose (her real character art).
  const pose = portraitForState(s);
  if(pose && !avatarPortrait.src.endsWith(pose)) avatarPortrait.src = pose;

  // A small nod as she starts to speak -- a beat of acknowledgement.
  if(s === 'speaking' && typeof playSequence === 'function') playSequence('nod', 900);

  // SVG mode: speaking gets a talking mouth.
  if(mouthTimer){ clearInterval(mouthTimer); mouthTimer = null; }
  const svgMode = !videoClips && !portraitClips;
  if(s === 'speaking' && svgMode){
    let t = 0;
    mouthTimer = setInterval(()=>{
      t += 0.45;
      const open = 6 + Math.abs(Math.sin(t)) * 9;
      document.getElementById('mouth').setAttribute(
        'd', `M94 122 Q110 ${122 + open} 126 122`);
    }, 70);
  } else if(svgMode){
    render(current, currentMood, lastAppearance);  // restore mood mouth
  }
}

// Bootstrap: prefer video clips > her real still portraits > the SVG.
fetch('/avatar/manifest').then(r => r.json()).then(m => {
  if(m.video_mode){
    videoClips = m;
    document.getElementById('avatar').style.display = 'none';
    avatarVideo.style.display = 'block';
    avatarVideo.src = clipForState('idle');
  } else if(m.portrait_mode){
    portraitClips = m;
    document.getElementById('avatar').style.display = 'none';
    avatarPortrait.style.display = 'block';
    avatarPortrait.src = portraitForState('idle');
  }
}).catch(()=>{});

// --- bringing her to life: procedural motion + choreographed sequences --------
// Her art is single poses, not aligned frames, so life comes from MOTION on the
// pose rather than flipping between dissimilar drawings. A base idle loop
// (breathing, sway, float) runs always; its agitation scales with her real
// mood (more sway when her unease is high, more lift when warm) so her body
// language is a true readout of her state. On top of that, short *sequences*
// (greet, nod, happy bounce, fidget) play on events and ease back to idle.
function animTarget(){
  if(portraitClips) return avatarPortrait;
  if(videoClips) return avatarVideo;
  return null;  // SVG mode runs its own idle()/blink()
}

// Sequences: each maps progress p in [0,1] -> transform deltas layered over idle.
const SEQUENCES = {
  // a little lean-in + side tilt, like a wave hello
  greet:  p => ({ y:-6*Math.sin(p*Math.PI), rot: 4*Math.sin(p*Math.PI*2), s: 0.01*Math.sin(p*Math.PI) }),
  // two quick nods (she acknowledges / starts to speak)
  nod:    p => ({ y: 5*Math.abs(Math.sin(p*Math.PI*2)), rot: 0, s: 0 }),
  // a buoyant double bounce when she's warm/affectionate
  happy:  p => ({ y:-12*Math.abs(Math.sin(p*Math.PI*2)), rot: 2*Math.sin(p*Math.PI*4), s: 0.02*Math.sin(p*Math.PI*2) }),
  // small restless shifts when her unease is up
  fidget: p => ({ y: 0, rot: 3*Math.sin(p*Math.PI*6), s: 0 }),
};
let activeSeq = null, seqStart = 0, seqDur = 0;
function playSequence(name, durMs){
  if(!SEQUENCES[name]) return;
  activeSeq = name; seqDur = durMs || 1400; seqStart = performance.now();
}

let animT = 0, lastTs = 0;
function animateAvatar(ts){
  const el = animTarget();
  if(el){
    const dt = lastTs ? (ts - lastTs)/1000 : 0.016; lastTs = ts;
    animT += dt;
    const fear = (current && current.fear) || 0;
    const love = (current && current.love) || 0.4;
    // Base idle: breathing, mood-scaled sway, gentle float.
    const breathe = 1 + Math.sin(animT*1.6) * 0.012;
    const sway = Math.sin(animT*0.8) * (1.5 + fear*5);          // restless when uneasy
    const floatY = Math.sin(animT*1.1) * (2 + love*1.5);        // buoyant when warm
    let tilt = Math.sin(animT*0.5) * (0.6 + fear*1.6);
    let extraY = 0, extraS = 1;
    // State flavor.
    if(avatarState === 'speaking'){ extraY = Math.abs(Math.sin(animT*6)) * -4; extraS = 1 + Math.sin(animT*6)*0.008; }
    else if(avatarState === 'listening'){ extraY = -5; extraS = 1.02; }
    else if(avatarState === 'thinking'){ tilt += 3 + Math.sin(animT*1.4)*1.5; }
    // Active one-shot sequence, eased.
    let sx = 0, sy = 0, sr = 0, ss = 0;
    if(activeSeq){
      const p = (ts - seqStart) / seqDur;
      if(p >= 1){ activeSeq = null; }
      else { const d = SEQUENCES[activeSeq](p); sy = d.y; sr = d.rot; ss = d.s; }
    }
    el.style.transform =
      `translate(${sway+sx}px, ${floatY+extraY+sy}px) ` +
      `rotate(${tilt*0.15 + sr*0.15}deg) scale(${(breathe*extraS)+ss})`;
  }
  requestAnimationFrame(animateAvatar);
}
requestAnimationFrame(animateAvatar);

// Idle "life ticks": once in a while she shifts on her own, more if anxious.
setInterval(()=>{
  if(!animTarget() || activeSeq || avatarState !== 'idle') return;
  const fear = (current && current.fear) || 0;
  if(fear > 0.5 && Math.random() < 0.5) playSequence('fidget', 1200);
  else if(Math.random() < 0.25) playSequence('nod', 900);
}, 9000);

// React to mood changes with a fitting little sequence.
let prevMoodSeq = '';
function moodSequence(mood){
  if(mood === prevMoodSeq) return;
  prevMoodSeq = mood;
  if(mood === 'affectionate') playSequence('happy', 1500);
  else if(mood === 'anxious') playSequence('fidget', 1400);
}

// --- her voice: spoken replies via the OS speech engine (fully local) ---------
let speakOn = localStorage.getItem('alpeccaSpeak') === '1';
const speakBtn = document.getElementById('speakBtn');
function renderSpeakBtn(){ speakBtn.textContent = speakOn ? '🔊' : '🔇'; }
renderSpeakBtn();
speakBtn.addEventListener('click', ()=>{
  speakOn = !speakOn;
  localStorage.setItem('alpeccaSpeak', speakOn ? '1' : '0');
  if(!speakOn) speechSynthesis.cancel();
  renderSpeakBtn();
});
let herVoice = null;
function pickVoice(){
  const vs = speechSynthesis.getVoices();
  // Prefer a natural female English voice; fall back to anything English.
  herVoice = vs.find(v => /female|aria|jenny|zira|libby|sonia/i.test(v.name) && v.lang.startsWith('en'))
          || vs.find(v => v.lang.startsWith('en')) || null;
}
pickVoice();
speechSynthesis.onvoiceschanged = pickVoice;
function speak(text){
  if(!speakOn || !text){
    // Not speaking aloud: flash the speaking state briefly so the avatar
    // still visibly "says" her reply, then settle.
    setAvatarState('speaking');
    setTimeout(()=>{ if(avatarState === 'speaking') setAvatarState('idle'); }, 1600);
    return;
  }
  const u = new SpeechSynthesisUtterance(text);
  if(herVoice) u.voice = herVoice;
  u.rate = 1.0; u.pitch = 1.05;
  u.onstart = ()=> setAvatarState('speaking');
  u.onend = ()=>{ if(!speechSynthesis.pending) setAvatarState('idle'); };
  speechSynthesis.speak(u);
}

// --- your voice: push-to-talk, transcribed locally on the server --------------
const micBtn = document.getElementById('micBtn');
let recorder = null, chunks = [];
micBtn.addEventListener('click', async ()=>{
  if(recorder && recorder.state === 'recording'){
    recorder.stop();   // -> onstop sends it
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio: true});
    chunks = [];
    recorder = new MediaRecorder(stream);
    recorder.ondataavailable = e => { if(e.data.size) chunks.push(e.data); };
    recorder.onstop = async ()=>{
      stream.getTracks().forEach(t => t.stop());
      micBtn.textContent = '🎤'; micBtn.style.background = '#3a3158';
      const blob = new Blob(chunks, {type: recorder.mimeType});
      statusEl.textContent = 'listening to what you said…';
      setAvatarState('thinking');
      try {
        const r = await fetch('/listen', {method: 'POST', body: blob});
        const d = await r.json();
        statusEl.textContent = '';
        if(d.heard && d.text){
          // Send the words through the exact same path as typed chat.
          addMsg(d.text, 'me');
          if(ws.readyState === 1) ws.send(JSON.stringify({text: d.text}));
        } else {
          setAvatarState('idle');
          statusEl.textContent = "couldn't make that out — try again a little closer to the mic";
        }
      } catch(e){
        setAvatarState('idle');
        statusEl.textContent = 'transcription failed — is the server running?';
      }
    };
    recorder.start();
    micBtn.textContent = '⏹'; micBtn.style.background = '#7a3a5a';
    setAvatarState('listening');
  } catch(e){
    statusEl.textContent = 'microphone unavailable or permission denied';
  }
});

// --- camera mode: show her something live ------------------------------------
const camOverlay = document.getElementById('camOverlay');
const camVideo = document.getElementById('camVideo');
let camStream = null;
function closeCam(){
  if(camStream){ camStream.getTracks().forEach(t => t.stop()); camStream = null; }
  camVideo.srcObject = null;
  camOverlay.style.display = 'none';
}
document.getElementById('camBtn').addEventListener('click', async ()=>{
  try {
    camStream = await navigator.mediaDevices.getUserMedia({video: {width: {ideal: 1280}}});
    camVideo.srcObject = camStream;
    camOverlay.style.display = 'flex';
  } catch(e){
    statusEl.textContent = 'camera unavailable or permission denied';
  }
});
document.getElementById('camCancel').addEventListener('click', closeCam);
document.getElementById('camSnap').addEventListener('click', ()=>{
  if(!camStream || ws.readyState !== 1){ closeCam(); return; }
  const canvas = document.createElement('canvas');
  const scale = Math.min(1, 768 / Math.max(camVideo.videoWidth, camVideo.videoHeight));
  canvas.width = Math.round(camVideo.videoWidth * scale);
  canvas.height = Math.round(camVideo.videoHeight * scale);
  canvas.getContext('2d').drawImage(camVideo, 0, 0, canvas.width, canvas.height);
  const shot = canvas.toDataURL('image/jpeg', 0.85);
  closeCam();
  const input = document.getElementById('input');
  const text = input.value.trim();
  const d = document.createElement('div');
  d.className = 'msg me';
  if(text) d.textContent = text;
  const im = document.createElement('img'); im.src = shot;
  d.appendChild(im);
  log.appendChild(d); log.scrollTop = log.scrollHeight;
  ws.send(JSON.stringify({text, image: shot, source: 'camera'}));
  input.value = '';
  setAvatarState('thinking');
});

// --- showing her images ------------------------------------------------------
// The file is downscaled in-browser (she doesn't need 12 megapixels to see a
// photo) and rides along with the next message as a data URL.
let pendingImage = null;
const attachChip = document.getElementById('attachChip');
document.getElementById('attachBtn').addEventListener('click', ()=>
  document.getElementById('imageFile').click());
document.getElementById('imageFile').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const img = new Image();
  img.onload = ()=>{
    const scale = Math.min(1, 768 / Math.max(img.width, img.height));
    const canvas = document.createElement('canvas');
    canvas.width = Math.round(img.width * scale);
    canvas.height = Math.round(img.height * scale);
    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
    pendingImage = canvas.toDataURL('image/jpeg', 0.85);
    attachChip.style.display = 'block';
    attachChip.textContent = '📎 image attached — it will go with your next message';
    URL.revokeObjectURL(img.src);
  };
  img.src = URL.createObjectURL(file);
  e.target.value = '';
});

document.getElementById('form').addEventListener('submit', (e)=>{
  e.preventDefault();
  const input = document.getElementById('input');
  const text = input.value.trim();
  // "/do <task>" hands her the computer for a task instead of just chatting.
  if(text.startsWith('/do ')){
    const task = text.slice(4).trim();
    addMsg('/do ' + task, 'me'); input.value = '';
    setAvatarState('thinking');
    fetch('/computer/task', {method:'POST', headers:{'content-type':'application/json'},
      body: JSON.stringify({task})}).then(r=>r.json()).then(d=>{
        if(!d.ok){ statusEl.textContent = d.error || 'could not start'; setAvatarState('idle'); }
      }).catch(()=>{ statusEl.textContent='request failed'; setAvatarState('idle'); });
    return;
  }
  if((!text && !pendingImage) || ws.readyState !== 1) return;
  const payload = {text};
  if(pendingImage){
    payload.image = pendingImage;
    const d = document.createElement('div');
    d.className = 'msg me';
    if(text) d.textContent = text;
    const im = document.createElement('img'); im.src = pendingImage;
    d.appendChild(im);
    log.appendChild(d); log.scrollTop = log.scrollHeight;
    pendingImage = null; attachChip.style.display = 'none';
  } else {
    addMsg(text, 'me');
  }
  ws.send(JSON.stringify(payload)); input.value = '';
  setAvatarState('thinking');
});
</script>
</body>
</html>
