<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Alpecca</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<!-- Shared soft-tech/glow design system + live mood-glow (tokens come from app.css). -->
<link rel="stylesheet" href="/web/app.css" />
<script src="/web/glow.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin:0; font-family: var(--font);
         background: radial-gradient(1200px 800px at 50% -10%, #0c1426, var(--bg));
         color: var(--ink); min-height:100vh; display:flex; flex-direction:column; align-items:center; }
  header { text-align:center; padding:16px 0 4px; }
  header h1 { margin:0; font-weight:600; letter-spacing:.5px; }
  header .mood { color:var(--muted); font-size:13px; margin-top:2px; }
  #conn { font-size:12px; margin-top:6px; color:var(--warn); max-width:520px; line-height:1.4; }
  #conn code { background:var(--bg-2); padding:1px 6px; border-radius:5px; color:var(--ink); }
  #conn.ok { display:none; }

  .stage { display:flex; flex-direction:column; align-items:center; gap:8px; }
  #avatar { filter: drop-shadow(0 12px 34px rgba(0,0,0,.5)); }
  /* Custom-art video avatar (data/avatar/*.mp4) -- hidden until clips exist. */
  #avatarVideo { display:none; width:220px; height:240px; object-fit:cover;
                 border-radius:24px; filter: drop-shadow(0 12px 34px rgba(0,0,0,.5)); }
  /* Her real still character art (data/avatar/portraits/*.png), one per state. */
  #avatarPortrait { display:none; width:230px; height:270px; object-fit:contain;
                    border-radius:22px;
                    background:radial-gradient(130px 130px at 50% 42%, #0c1426, transparent);
                    filter: drop-shadow(0 12px 34px rgba(0,0,0,.5)); transition:opacity .25s; }
  /* Listening: a soft attention ring around whichever avatar is showing. */
  .stage.listening #avatar, .stage.listening #avatarVideo, .stage.listening #avatarPortrait {
    filter: drop-shadow(0 12px 34px rgba(0,0,0,.5)) drop-shadow(0 0 18px rgba(127,217,255,.55)); }
  /* Thinking: a little thought bubble over the SVG. */
  #thoughtDots { opacity:0; transition:opacity .3s; }
  .stage.thinking #thoughtDots { opacity:1; }

  /* --- her life: CSS-driven so it never freezes (no requestAnimationFrame).
     A gentle breathing/sway runs always; state classes change the tempo; her
     mood scales it via --idle-dur / --idle-rot, set from JS (not per-frame). */
  @keyframes alpeccaIdle {
    0%,100% { transform: translateY(0) rotate(calc(var(--idle-rot,0.7deg) * -1)) scale(1); }
    50%     { transform: translateY(-6px) rotate(var(--idle-rot,0.7deg)) scale(1.013); }
  }
  #avatarPortrait, #avatarVideo {
    animation: alpeccaIdle var(--idle-dur,4.4s) ease-in-out infinite;
    transition: opacity .22s ease;
  }
  .stage.speaking #avatarPortrait, .stage.speaking #avatarVideo { animation-duration: 1.2s; }
  .stage.thinking #avatarPortrait { animation-duration: 5.6s; }
  .stage.listening #avatarPortrait { animation-duration: 3.4s; }

  /* Alpecca's own note about how she's chosen to look (she decides, not you) */
  .lookNote { max-width:300px; text-align:center; font-size:11.5px; color:var(--muted);
              font-style:italic; line-height:1.4; min-height:16px; }

  .bars { display:flex; gap:14px; margin-top:2px; font-size:11px; color:var(--muted); }
  .bar { display:flex; flex-direction:column; align-items:center; gap:3px; }
  .bar .track { width:64px; height:5px; border-radius:3px; background:#16203a; overflow:hidden; }
  .bar .fill { height:100%; width:0; border-radius:3px; transition:width .8s ease; }

  #chat { width:min(640px,94vw); height:46vh; min-height:280px; display:flex; flex-direction:column;
          background:var(--panel-solid); border:1px solid var(--line); border-radius:16px;
          margin:14px 0; overflow:hidden; box-shadow:var(--shadow-panel); }
  #log { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; }
  .msg { max-width:78%; padding:9px 13px; border-radius:14px; line-height:1.4; font-size:14px; }
  .me { align-self:flex-end; background:#1b3350; }
  .her { align-self:flex-start; background:var(--bg-2); border:1px solid var(--line); }
  .mem { align-self:flex-start; font-size:11px; color:var(--muted); font-style:italic; padding:0 6px; }
  .introspect { align-self:center; max-width:88%; font-size:12.5px; color:var(--ink);
                background:var(--bg-2); border:1px dashed var(--line-2); border-radius:12px;
                padding:9px 13px; line-height:1.45; }
  .introspect b { color:var(--accent); font-weight:600; }
  .proactive { align-self:flex-start; background:var(--bg-2); border:1px solid var(--line-2);
               box-shadow:0 0 12px rgba(127,217,255,.15); }
  .msg img { max-width:100%; border-radius:10px; display:block; margin-top:6px; }
  #attachChip { display:none; font-size:11px; color:var(--accent); padding:0 12px 6px; }
  form { display:flex; gap:8px; padding:12px; border-top:1px solid var(--line); }
  input { flex:1; background:var(--bg-2); border:1px solid var(--line); color:var(--ink);
          padding:11px 13px; border-radius:10px; font-size:14px; outline:none; }
  input:focus { border-color:var(--accent); }
  button { background:var(--accent); color:#06121c; border:0; padding:0 18px;
           border-radius:10px; font-weight:600; cursor:pointer; box-shadow:var(--mood-glow); }
  .status { font-size:11px; color:var(--muted); padding:0 12px 8px; }

  .chartwrap { width:min(640px,94vw); background:var(--panel-solid); border:1px solid var(--line);
               border-radius:16px; padding:12px 14px; margin-bottom:24px; box-shadow:var(--shadow-panel); }
  .chartwrap h3 { margin:2px 0 8px; font-size:13px; font-weight:600; color:var(--muted); }
</style>
</head>
<body>
  <header>
    <h1>Alpecca</h1>
    <div class="mood" id="moodLabel">connecting…</div>
    <div id="conn"></div>
  </header>

  <div class="stage" id="stage">
    <!-- Custom character art: looping clips from data/avatar/, switched by
         avatar state. Hidden unless clips exist (see /avatar/manifest). -->
    <video id="avatarVideo" autoplay loop muted playsinline></video>
    <!-- Her real still character art, one pose per state (portrait mode). -->
    <img id="avatarPortrait" alt="Alpecca" />
    <a href="/studio" style="font-size:12px;color:var(--accent);text-decoration:none;">✦ her studio</a>
    <a href="/live2d" style="font-size:12px;color:var(--accent);text-decoration:none;margin-left:12px;">✦ live avatar</a>
    <a href="/vrm" style="font-size:12px;color:var(--accent);text-decoration:none;margin-left:12px;">✦ 3D body</a>
    <!-- A character avatar (Replika-style customizable companion). Idle
         breathing + blinking run on a clock; mood drives the expression. -->
    <svg id="avatar" width="220" height="240" viewBox="0 0 220 240" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="cheek" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#ff9ec4"/><stop offset="100%" stop-color="#ff9ec4" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <g id="bob">
        <!-- body -->
        <ellipse id="body" cx="110" cy="196" rx="56" ry="40" fill="#cfe0ff"/>
        <!-- accessory: scarf (behind head) -->
        <path id="scarf" d="M70 168 q40 22 80 0 l-6 16 q-34 16 -68 0 z" fill="#7ad1c0" opacity="0" />
        <!-- neck -->
        <rect x="98" y="150" width="24" height="26" rx="10" fill="#cfe0ff"/>
        <!-- head group (breathes/sways) -->
        <g id="head">
          <!-- ears (alpaca-ish) -->
          <ellipse id="earL" cx="80" cy="58" rx="12" ry="24" fill="#cfe0ff"/>
          <ellipse id="earR" cx="140" cy="58" rx="12" ry="24" fill="#cfe0ff"/>
          <!-- face -->
          <ellipse id="face" cx="110" cy="98" rx="52" ry="50" fill="#cfe0ff"/>
          <!-- accessory: flower on ear -->
          <g id="flower" opacity="0">
            <circle cx="150" cy="62" r="6" fill="#ffd27a"/>
            <g fill="#ff9ec4">
              <circle cx="150" cy="53" r="5"/><circle cx="159" cy="62" r="5"/>
              <circle cx="150" cy="71" r="5"/><circle cx="141" cy="62" r="5"/>
            </g>
          </g>
          <!-- cheeks (warmth) -->
          <circle id="cheekL" cx="84" cy="110" r="13" fill="url(#cheek)" opacity="0"/>
          <circle id="cheekR" cx="136" cy="110" r="13" fill="url(#cheek)" opacity="0"/>
          <!-- brows -->
          <g stroke="#0a1018" stroke-width="4" stroke-linecap="round">
            <line id="browL" x1="80" y1="78" x2="100" y2="78"/>
            <line id="browR" x1="120" y1="78" x2="140" y2="78"/>
          </g>
          <!-- eyes (scaleY animates for blink) -->
          <g fill="#0a1018">
            <ellipse id="eyeL" cx="90" cy="96" rx="8" ry="9"/>
            <ellipse id="eyeR" cx="130" cy="96" rx="8" ry="9"/>
          </g>
          <!-- accessory: glasses -->
          <g id="glasses" opacity="0" stroke="#0a1018" stroke-width="3" fill="none">
            <circle cx="90" cy="96" r="14"/><circle cx="130" cy="96" r="14"/>
            <line x1="104" y1="96" x2="116" y2="96"/>
          </g>
          <!-- mouth -->
          <path id="mouth" d="M92 122 Q110 134 128 122" stroke="#0a1018"
                stroke-width="4" fill="none" stroke-linecap="round"/>
          <!-- thought bubble (thinking state) -->
          <g id="thoughtDots" fill="#8aa0c6">
            <circle cx="166" cy="46" r="3"/>
            <circle cx="176" cy="36" r="4.5"/>
            <circle cx="189" cy="24" r="6"/>
          </g>
        </g>
      </g>
    </svg>

    <div class="lookNote" id="lookNote"></div>

    <div class="bars">
      <div class="bar">warmth<div class="track"><div class="fill" id="fLove" style="background:#7fd9ff"></div></div></div>
      <div class="bar">care<div class="track"><div class="fill" id="fComp" style="background:#48e08a"></div></div></div>
      <div class="bar">unease<div class="track"><div class="fill" id="fFear" style="background:#ffb648"></div></div></div>
    </div>
  </div>

  <div id="chat">
    <div id="log"></div>
    <div class="status" id="status"></div>
    <div id="attachChip"></div>
    <form id="form">
      <input id="input" placeholder="Say something to Alpecca…" autocomplete="off" />
      <input type="file" id="imageFile" accept="image/*" style="display:none" />
      <button type="button" id="micBtn" title="Hold a conversation by voice — click to talk, click again to send"
              style="background:var(--bg-2);color:var(--ink);padding:0 12px;">🎤</button>
      <button type="button" id="speakBtn" title="Toggle Alpecca speaking her replies aloud"
              style="background:var(--bg-2);color:var(--ink);padding:0 12px;">🔇</button>
      <button type="button" id="attachBtn" title="Show Alpecca an image"
              style="background:var(--bg-2);color:var(--ink);padding:0 12px;">📎</button>
      <button type="button" id="camBtn" title="Show Alpecca something through your camera"
              style="background:var(--bg-2);color:var(--ink);padding:0 12px;">📷</button>
      <button type="button" id="introspectBtn" title="Ask Alpecca to examine its own state"
              style="background:var(--bg-2);color:var(--ink);padding:0 12px;">self?</button>
      <button type="submit">Send</button>
    </form>
  </div>

  <!-- Camera mode: a live preview so you can frame what you're showing her. -->
  <div id="camOverlay" style="display:none; position:fixed; inset:0; z-index:50;
       background:rgba(7,11,20,.85); align-items:center; justify-content:center;
       flex-direction:column; gap:12px;">
    <video id="camVideo" autoplay playsinline
           style="max-width:min(640px,92vw); border-radius:14px;
                  box-shadow:0 16px 60px rgba(0,0,0,.6);"></video>
    <div style="display:flex; gap:10px;">
      <button type="button" id="camSnap"
              style="background:var(--accent);color:#06121c;border:0;
                     padding:10px 22px;border-radius:10px;font-weight:600;cursor:pointer;">
        Show her</button>
      <button type="button" id="camCancel"
              style="background:var(--bg-2);color:var(--ink);border:0;
                     padding:10px 22px;border-radius:10px;cursor:pointer;">Cancel</button>
    </div>
  </div>

  <div class="chartwrap">
    <h3>Alpecca's emotional life</h3>
    <canvas id="moodChart" height="120"></canvas>
  </div>

<script>
const log = document.getElementById('log');
const statusEl = document.getElementById('status');
const moodLabel = document.getElementById('moodLabel');
let current = {love:0.4, compassion:0.2, fear:0.0};
let currentMood = '';        // tracked so the blink redraw doesn't corrupt the label
let lastAppearance = null;

function addMsg(text, cls){
  const d = document.createElement('div');
  d.className = 'msg ' + cls; d.textContent = text;
  log.appendChild(d); log.scrollTop = log.scrollHeight;
}
function addMem(items){
  if(!items || !items.length) return;
  const d = document.createElement('div');
  d.className = 'mem'; d.textContent = '…remembering: ' + items.join('  •  ');
  log.appendChild(d); log.scrollTop = log.scrollHeight;
}

// --- avatar: render Alpecca's SELF-CHOSEN look + mood ----------------------
// Appearance comes from the server (she decides it). The UI only displays it.
function applyAppearance(app){
  if(!app) return;
  const c = app.color;
  ['body','earL','earR','face'].forEach(id=>document.getElementById(id).setAttribute('fill', c));
  document.querySelector('#bob rect').setAttribute('fill', c);
  ['scarf','glasses','flower'].forEach(a=>
    document.getElementById(a).setAttribute('opacity',
      (app.accessories||[]).includes(a) ? 1 : 0));
  if(app.note) document.getElementById('lookNote').textContent = '“' + app.note + '”';
}

function render(state, mood, appearance){
  current = state;
  // The chat breathes with her too: hand her live mood to the shared glow channel.
  if(window.applyMood) applyMood({warmth:state.love, unease:state.fear,
    curiosity:state.curiosity, glow:(state.energy!=null?state.energy:state.love)});
  if(mood){ currentMood = mood; if(typeof moodSequence === 'function') moodSequence(mood); }
  if(appearance){ lastAppearance = appearance; applyAppearance(appearance); }
  const {love, compassion, fear} = state;
  document.getElementById('fLove').style.width = (love*100)+'%';
  document.getElementById('fComp').style.width = (compassion*100)+'%';
  document.getElementById('fFear').style.width = (fear*100)+'%';
  if(currentMood) moodLabel.textContent = 'feeling ' + currentMood;

  // mouth: smile rises with warmth, falls with unease
  const smile = Math.max(-8, Math.min(18, (love-0.4)*32 - fear*22));
  document.getElementById('mouth').setAttribute('d', `M92 122 Q110 ${122+smile} 128 122`);
  // brows lift inward when uneasy
  const lift = fear*9;
  document.getElementById('browL').setAttribute('y1', 78-lift);
  document.getElementById('browR').setAttribute('y1', 78-lift);
  // eyes soften (narrow) with care
  const ry = 9 - compassion*3.5;
  document.getElementById('eyeL').setAttribute('ry', ry);
  document.getElementById('eyeR').setAttribute('ry', ry);
  // cheeks blush with warmth
  const blush = Math.max(0, (love-0.45)*1.8);
  document.getElementById('cheekL').setAttribute('opacity', blush);
  document.getElementById('cheekR').setAttribute('opacity', blush);
}

// --- idle life: breathing, sway, blinking ---------------------------------
let t = 0;
function idle(){
  t += 0.05;
  const breathe = 1 + Math.sin(t)*0.012;
  const sway = Math.sin(t*0.6)*2;
  document.getElementById('bob').setAttribute(
    'transform', `translate(${sway} ${Math.sin(t)*1.5}) scale(${breathe})`);
  // anxiety makes the sway a touch quicker/jitterier
  requestAnimationFrame(idle);
}
idle();
function blink(){
  const eyes = [document.getElementById('eyeL'), document.getElementById('eyeR')];
  eyes.forEach(e=>e.setAttribute('ry', 1));
  setTimeout(()=>render(current, currentMood, lastAppearance), 120);
  // next blink in 2.5–6s; more often when uneasy
  setTimeout(blink, 2500 + Math.random()*3500 * (1 - current.fear*0.5));
}
setTimeout(blink, 3000);

// --- mood history chart ----------------------------------------------------
let chart;
async function refreshChart(){
  try {
    const r = await fetch('/history?limit=120'); const d = await r.json();
    const h = d.history || [];
    const labels = h.map(p=> new Date(p.ts*1000).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}));
    const mk = (key,color)=>({label:key, data:h.map(p=>p[key]), borderColor:color,
      backgroundColor:color+'22', tension:0.35, pointRadius:0, borderWidth:2, fill:true});
    const data = {labels, datasets:[mk('love','#7fd9ff'), mk('compassion','#48e08a'), mk('fear','#ffb648')]};
    if(!chart){
      chart = new Chart(document.getElementById('moodChart'), {type:'line', data,
        options:{responsive:true, animation:false, scales:{
          y:{min:0,max:1,ticks:{color:'#8aa0c6'},grid:{color:'#1d2a47'}},
          x:{ticks:{color:'#8aa0c6',maxTicksLimit:6},grid:{display:false}}},
          plugins:{legend:{labels:{color:'#cfe0ff',boxWidth:12}}}}});
    } else { chart.data = data; chart.update(); }
  } catch(e){ /* offline */ }
}

// --- websocket + polling ---------------------------------------------------
const connEl = document.getElementById('conn');
function setConn(msg){ if(!msg){ connEl.className='ok'; connEl.innerHTML=''; }
  else { connEl.className=''; connEl.innerHTML=msg; } }

// If the page was opened as a file (double-clicked), there's no server to talk
// to. This is the most common reason Alpecca seems "stuck". Say so plainly.
if(location.protocol === 'file:'){
  moodLabel.textContent = 'not connected';
  setConn("You opened this file directly. Alpecca needs her server running. In a terminal run <code>python server.py</code>, then open <code>http://127.0.0.1:8765</code> in your browser.");
}

let ws, wsTries = 0;
const CAPABILITY_LEASE_HEADER = 'X-Alpecca-Capability-Lease';
const CAPABILITY_PURPOSE_HEADER = 'X-Alpecca-Capability-Purpose';
const CAPABILITY_CONNECTION_HEADER = 'X-Alpecca-Capability-Connection';
let capabilityConnection = null;
const capabilityLeases = new Map();

function capabilityLabel(purpose){
  return purpose === 'push_to_talk' ? 'Microphone' : 'Camera';
}

function releaseCapabilityLease(lease){
  if(!lease) return;
  if(capabilityLeases.get(lease.purpose) === lease) capabilityLeases.delete(lease.purpose);
  if(lease.expiryTimer !== null) clearTimeout(lease.expiryTimer);
  lease.expiryTimer = null;
  lease.token = '';
  lease.leaseId = '';
  lease.connectionId = '';
}

async function stopCapabilityLease(leaseOrPurpose){
  const lease = typeof leaseOrPurpose === 'string'
    ? capabilityLeases.get(leaseOrPurpose)
    : leaseOrPurpose;
  if(!lease) return;
  if(capabilityLeases.get(lease.purpose) === lease) capabilityLeases.delete(lease.purpose);
  if(lease.expiryTimer !== null) clearTimeout(lease.expiryTimer);
  lease.expiryTimer = null;
  const leaseId = lease.leaseId;
  const connectionId = lease.connectionId;
  lease.token = '';
  lease.leaseId = '';
  lease.connectionId = '';
  if(!leaseId || !connectionId) return;
  try {
    await fetch(`/security/capability-leases/${encodeURIComponent(leaseId)}/stop`, {
      method: 'POST', cache: 'no-store',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({connection_id: connectionId}),
    });
  } catch(e){
    // Socket revocation and server expiry remain authoritative if this cannot arrive.
  }
}

function stopAllCapabilityLeases(){
  for(const lease of Array.from(capabilityLeases.values())) void stopCapabilityLease(lease);
}

function expireCapabilityLease(lease){
  if(capabilityLeases.get(lease.purpose) !== lease) return;
  void stopCapabilityLease(lease);
  if(lease.purpose === 'push_to_talk') cancelMicrophone(false);
  else closeCam(false);
  statusEl.textContent = `${capabilityLabel(lease.purpose)} permission expired - try again.`;
}

function capabilityLeaseIsUsable(lease, purpose){
  if(!lease || !lease.token || lease.purpose !== purpose ||
     capabilityLeases.get(purpose) !== lease ||
     capabilityConnection?.id !== lease.connectionId) return false;
  if(lease.expiresAt * 1000 <= Date.now()){
    expireCapabilityLease(lease);
    return false;
  }
  return true;
}

function capabilityLeaseHeaders(lease){
  if(!capabilityLeaseIsUsable(lease, lease?.purpose)){
    throw new Error('Capability permission expired.');
  }
  const headers = new Headers();
  headers.set(CAPABILITY_LEASE_HEADER, lease.token);
  headers.set(CAPABILITY_PURPOSE_HEADER, lease.purpose);
  headers.set(CAPABILITY_CONNECTION_HEADER, lease.connectionId);
  return headers;
}

async function acquireCapabilityLease(purpose){
  const connection = capabilityConnection;
  if(!connection || connection.surface !== 'websocket' || connection.principal !== 'creator' ||
     !ws || ws.readyState !== WebSocket.OPEN){
    throw new Error(`Live connection is not ready for ${capabilityLabel(purpose).toLowerCase()}.`);
  }
  await stopCapabilityLease(purpose);
  if(capabilityConnection?.id !== connection.id || !ws || ws.readyState !== WebSocket.OPEN){
    throw new Error('Live connection changed before permission could be requested.');
  }
  const response = await fetch('/security/capability-leases', {
    method: 'POST', cache: 'no-store',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({connection_id: connection.id, purpose}),
  });
  if(!response.ok) throw new Error(`${capabilityLabel(purpose)} permission was not granted.`);
  const payload = await response.json();
  const leaseId = typeof payload.lease_id === 'string' ? payload.lease_id : '';
  const token = typeof payload.token === 'string' ? payload.token : '';
  const expiresAt = typeof payload.expires_at === 'number' ? payload.expires_at : NaN;
  if(!leaseId || !token || !Number.isFinite(expiresAt) || expiresAt * 1000 <= Date.now()){
    if(leaseId) await stopCapabilityLease({
      leaseId, token: '', purpose, connectionId: connection.id, expiryTimer: null,
    });
    throw new Error(`${capabilityLabel(purpose)} permission response was invalid.`);
  }
  const lease = {
    leaseId, token, purpose, connectionId: connection.id, expiresAt, expiryTimer: null,
  };
  if(capabilityConnection?.id !== connection.id || !ws || ws.readyState !== WebSocket.OPEN){
    await stopCapabilityLease(lease);
    throw new Error('Live connection changed before permission was ready.');
  }
  capabilityLeases.set(purpose, lease);
  const expiresInMs = Math.max(0, Math.min(2147000000, expiresAt * 1000 - Date.now()));
  lease.expiryTimer = setTimeout(()=>expireCapabilityLease(lease), expiresInMs);
  return lease;
}

function setCapabilityConnection(value){
  const next = value && typeof value.id === 'string' && value.id.trim() &&
    value.surface === 'websocket' && value.principal === 'creator'
    ? {id: value.id.trim(), surface: 'websocket', principal: 'creator'}
    : null;
  if(!next){
    clearLocalCapabilityState();
    capabilityConnection = null;
    return;
  }
  if(capabilityConnection && capabilityConnection.id !== next.id) clearLocalCapabilityState();
  capabilityConnection = next;
}

function connect(){
  if(location.protocol === 'file:') return;   // nothing to connect to
  ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onopen = ()=>{ wsTries = 0; setConn(''); };
  ws.onmessage = (ev)=>{
    const m = JSON.parse(ev.data);
    if(m.type === 'state'){
      setCapabilityConnection(m.capability_connection);
      render(m.state, m.mood, m.appearance);
      if(typeof playSequence === 'function' && !window.__greeted){ window.__greeted = true; playSequence('greet', 1600); }
      statusEl.textContent = m.llm_online ? '' : 'Ollama offline — replies are stubbed. Start Ollama for real conversation.';
    } else if(m.type === 'reply'){
      addMem(m.memories_used); addMsg(m.reply, 'her'); speak(m.reply);
      render(m.state, m.mood, m.appearance); refreshChart();
    } else if(m.type === 'proactive'){
      // She chose to speak on her own -- style it softly distinct.
      const d = document.createElement('div');
      d.className = 'msg her proactive'; d.textContent = m.reply;
      log.appendChild(d); log.scrollTop = log.scrollHeight;
      speak(m.reply);
      render(m.state, m.mood, m.appearance); refreshChart();
    } else if(m.type === 'computer_status'){
      const d = document.createElement('div');
      d.className = 'mem'; d.textContent = '🖥️ ' + m.text;
      log.appendChild(d); log.scrollTop = log.scrollHeight;
    } else if(m.type === 'computer_confirm'){
      showComputerConfirm(m);
    } else if(m.type === 'computer_done'){
      const d = document.createElement('div');
      d.className = 'msg her';
      d.textContent = m.ok ? ('Done — ' + (m.summary || 'finished.'))
                           : ('I stopped: ' + (m.error || m.summary || 'unable to finish.'));
      log.appendChild(d); log.scrollTop = log.scrollHeight;
      setAvatarState('idle');
    } else if(m.type === 'error'){
      const leaseFailure = m.code === 'capability_lease_denied';
      statusEl.textContent = leaseFailure
        ? 'image permission expired or was rejected - try the image again'
        : (m.reason || m.error || 'Alpecca could not process that request');
      setAvatarState('idle');
    }
  };
  ws.onclose = ()=>{
    clearLocalCapabilityState();
    capabilityConnection = null;
    wsTries++;
    moodLabel.textContent = 'reconnecting…';
    if(wsTries >= 2)
      setConn("Can't reach Alpecca. Is her server running? Start it with <code>python server.py</code> and open <code>http://127.0.0.1:8765</code>.");
    setTimeout(connect, 1500);
  };
  ws.onerror = ()=>{ try{ ws.close(); }catch(e){} };
}
connect();

  setAvatarState('thinking');

    ov = document.createElement('div');
    ov.id = 'cuOverlay';
    ov.style = 'display:flex;position:fixed;inset:0;z-index:60;background:rgba(7,11,20,.88);'+
               'align-items:center;justify-content:center;flex-direction:column;gap:14px;padding:20px;';

// --- avatar state machine: idle / listening / thinking / speaking -------------
// One source of truth for "what is she doing right now". The SVG animates the
// states by default; when custom clips exist (data/avatar/*.mp4) the video
// avatar takes over, switched by the same states -- so her real character art
// drops in without touching any of this logic.
const stage = document.getElementById('stage');
const avatarVideo = document.getElementById('avatarVideo');
const avatarPortrait = document.getElementById('avatarPortrait');
let avatarState = 'idle';
let videoClips = null;          // /avatar/manifest result for video mode, or null
let portraitClips = null;       // /avatar/manifest result for portrait mode, or null
let mouthTimer = null;

function clipForState(s){
  if(!videoClips) return null;
  const want = {idle:'standby', listening:'listening', thinking:'thinking', speaking:'speaking'}[s];
  const have = videoClips.clips[want] ? want :
               (videoClips.clips.standby ? 'standby' : null);
  return have ? `/avatar/clip/${have}` : null;
}

function portraitForState(s){
  if(!portraitClips) return null;
  // Fall back to idle for any state that has no dedicated pose.
  const have = portraitClips.portraits[s] ? s :
               (portraitClips.portraits.idle ? 'idle' : null);
  return have ? `/avatar/portrait/${have}` : null;
}

function setAvatarState(s){
  if(s === avatarState) return;
  avatarState = s;
  stage.classList.toggle('listening', s === 'listening');
  stage.classList.toggle('thinking', s === 'thinking');

  // Video mode: swap the loop, with a poster of the current frame so the
  // transition never flashes black (Alice's frame-capture trick).
  const clip = clipForState(s);
  if(clip && !avatarVideo.src.endsWith(clip)){
    try {
      const c = document.createElement('canvas');
      c.width = avatarVideo.videoWidth || 220; c.height = avatarVideo.videoHeight || 240;
      c.getContext('2d').drawImage(avatarVideo, 0, 0, c.width, c.height);
      avatarVideo.poster = c.toDataURL('image/jpeg', 0.7);
    } catch(e){}
    avatarVideo.src = clip;
  }

  // Pose mode: re-pick the pose that fits her new state (mood folded in).
  if(typeof poseLib !== 'undefined' && poseLib){ showPose(); }
  else {  // portrait-by-state fallback when there's no pose library
    const pose = portraitForState(s);
    if(pose && !avatarPortrait.src.endsWith(pose)) avatarPortrait.src = pose;
  }

  // A small nod as she starts to speak -- a beat of acknowledgement.
  if(s === 'speaking' && typeof playSequence === 'function') playSequence('nod', 900);

  // SVG mode: speaking gets a talking mouth.
  if(mouthTimer){ clearInterval(mouthTimer); mouthTimer = null; }
  const svgMode = !videoClips && !portraitClips && !(typeof poseLib !== 'undefined' && poseLib);
  if(s === 'speaking' && svgMode){
    let t = 0;
    mouthTimer = setInterval(()=>{
      t += 0.45;
      const open = 6 + Math.abs(Math.sin(t)) * 9;
      document.getElementById('mouth').setAttribute(
        'd', `M94 122 Q110 ${122 + open} 126 122`);
    }, 70);
  } else if(svgMode){
    render(current, currentMood, lastAppearance);  // restore mood mouth
  }
}

// === Her avatar: real-art poses (AI-selected) + CSS life (no rAF) ============
// She uses her ACTUAL character renders -- a library of poses, each tagged with
// what it expresses. Her mood + what she's doing pick the pose; the UI cross-
// fades to it. Breathing/sway is pure CSS (GPU, never freezes -- the old
// requestAnimationFrame engine stalled in background tabs). Sequences she
// authored play as one-shot CSS animations built from her own keyframes.

let poseLib = null;        // her tagged pose library {file: {moods,states,energy}}, or null
let herSequences = {};     // her authored animations, by name

// Pick the pose that fits her real state -- DETERMINISTIC, mirrors
// posekit.select_pose. Her pose reads her actual feeling: mood match counts
// most, then what she's doing, then how close the pose's energy is to her own.
// It is NOT random -- it only changes when her state changes (her mood shifting,
// or her energy ebbing toward sleepy as she's left alone). So the sleeping pose
// shows up because she's actually drowsy, not on a timer.
function selectPose(){
  if(!poseLib) return null;
  const mood = currentMood || 'content';
  const energy = Math.max(0, Math.min(1, (current && current.energy != null) ? current.energy : 0.5));
  let best = null, bs = -1;
  for(const name of Object.keys(poseLib).sort()){
    const t = poseLib[name];
    let s = 0;
    if((t.moods||[]).includes(mood)) s += 3;
    if((t.states||[]).includes(avatarState)) s += 1.5;
    s += 1 - Math.abs(energy - (t.energy ?? 0.5));
    if(s > bs){ bs = s; best = name; }
  }
  return best;
}
let shownPose = null;
function showPose(){
  const name = selectPose();
  if(!name || name === shownPose) return;                 // only swap when state moves her
  shownPose = name;
  avatarPortrait.style.opacity = 0;                       // brief cross-fade
  setTimeout(()=>{ avatarPortrait.src = '/poses/img/' + name; avatarPortrait.style.opacity = 1; }, 200);
}

// Her mood scales the CSS idle tempo/lean: restless and quick when uneasy,
// slow and settled when calm. Set as CSS vars (event-driven, not per-frame).
function applyMoodMotion(){
  const fear = (current && current.fear) || 0;
  avatarPortrait.style.setProperty('--idle-dur', (5.2 - fear*2.4).toFixed(2) + 's');
  avatarPortrait.style.setProperty('--idle-rot', (0.6 + fear*1.6).toFixed(2) + 'deg');
}

// Sequences as one-shot CSS animations. HER authored keyframes win; a couple of
// simple built-ins cover greet/nod until she's choreographed her own.
const FALLBACK_SEQ = {
  greet:  [{t:0},{t:0.5,bob:-8,tilt:4,lean:0.4},{t:1}],
  nod:    [{t:0},{t:0.4,bob:6},{t:0.7,bob:2},{t:1}],
  happy:  [{t:0},{t:0.3,bob:-12,scale:0.02},{t:0.6,bob:-4},{t:1}],
  fidget: [{t:0},{t:0.3,sway:-4},{t:0.6,sway:4},{t:1}],
};
let seqStyleEl = null;
function frameTransform(f){
  const bob=(f.bob||0)-(f.lean||0)*5, sway=f.sway||0, tilt=f.tilt||0,
        sc=1+(f.scale||0)+(f.lean||0)*0.01;
  return `translate(${sway}px, ${bob}px) rotate(${tilt}deg) scale(${sc})`;
}
function playSequence(name, durMs){
  const el = avatarPortrait.style.display !== 'none' ? avatarPortrait
           : (avatarVideo.style.display !== 'none' ? avatarVideo : null);
  if(!el) return;                                  // SVG mode handles itself
  const seq = herSequences[name];                  // prefer HER choreography
  const frames = seq ? seq.keyframes : FALLBACK_SEQ[name];
  if(!frames) return;
  const dur = (seq && seq.duration_ms) || durMs || 1200;
  const anim = 'seq_' + name + '_' + Math.floor(performance.now());
  const rules = frames.map(f => `${Math.round((f.t||0)*100)}% { transform: ${frameTransform(f)}; }`).join(' ');
  if(!seqStyleEl){ seqStyleEl = document.createElement('style'); document.head.appendChild(seqStyleEl); }
  seqStyleEl.textContent = `@keyframes ${anim} { ${rules} }`;
  el.style.animation = `${anim} ${dur}ms ease-in-out`;     // overrides idle for one shot
  const done = ()=>{ el.style.animation = ''; el.removeEventListener('animationend', done); };
  el.addEventListener('animationend', done);
}

// Bootstrap: her poses (real art, AI-tagged) > video clips > still portraits > SVG.
function bootstrapAvatarFallback(){
  fetch('/avatar/manifest').then(r => r.json()).then(m => {
    if(m.video_mode){ videoClips = m; document.getElementById('avatar').style.display='none';
      avatarVideo.style.display='block'; avatarVideo.src = clipForState('idle'); }
    else if(m.portrait_mode){ portraitClips = m; document.getElementById('avatar').style.display='none';
      avatarPortrait.style.display='block'; avatarPortrait.src = portraitForState('idle'); }
  }).catch(()=>{});
}
fetch('/poses').then(r=>r.json()).then(d=>{
  if(d.pose_mode){
    poseLib = d.poses;
    document.getElementById('avatar').style.display = 'none';
    avatarPortrait.style.display = 'block';
    applyMoodMotion(); showPose();
  } else { bootstrapAvatarFallback(); }
}).catch(bootstrapAvatarFallback);

// Her authored animation library (she choreographs these herself).
fetch('/puppet').then(r=>r.json()).then(d=>{ herSequences = d.sequences || {}; }).catch(()=>{});

// Idle life ticks: every so often she stirs on her own, more when uneasy.
setInterval(()=>{
  if(avatarState !== 'idle') return;
  const fear = (current && current.fear) || 0;
  if(fear > 0.5 && Math.random() < 0.5) playSequence('fidget', 1300);
  else if(Math.random() < 0.22) playSequence('nod', 900);
}, 9000);

// A mood shift re-picks her pose, retunes her idle tempo, and plays a fitting beat.
let prevMoodSeq = '';
function moodSequence(mood){
  applyMoodMotion();
  if(poseLib) showPose();
  if(mood === prevMoodSeq) return;
  prevMoodSeq = mood;
  if(mood === 'affectionate') playSequence('happy', 1500);
  else if(mood === 'anxious') playSequence('fidget', 1400);
}

// --- her voice: server Kokoro/edge first, browser speech fallback -------------
let speakOn = localStorage.getItem('alpeccaSpeak') !== '0';
const speakBtn = document.getElementById('speakBtn');
function renderSpeakBtn(){ speakBtn.textContent = speakOn ? '🔊' : '🔇'; }
renderSpeakBtn();
speakBtn.addEventListener('click', ()=>{
  speakOn = !speakOn;
  localStorage.setItem('alpeccaSpeak', speakOn ? '1' : '0');
  if(!speakOn) speechSynthesis.cancel();
  renderSpeakBtn();
  if(speakOn) speak('Alpecca voice is on.');
});
let herVoice = null;
let herAudio = null, herAudioUrl = '';
function pickVoice(){
  const vs = speechSynthesis.getVoices();
  // Prefer a natural female English voice; fall back to anything English.
  herVoice = vs.find(v => /female|aria|jenny|zira|libby|sonia/i.test(v.name) && v.lang.startsWith('en'))
          || vs.find(v => v.lang.startsWith('en')) || null;
}
pickVoice();
speechSynthesis.onvoiceschanged = pickVoice;
function speakBrowser(text){
  if(!window.speechSynthesis || !text) return;
  const u = new SpeechSynthesisUtterance(text);
  if(herVoice) u.voice = herVoice;
  u.rate = 1.0; u.pitch = 1.05;
  u.onstart = ()=> setAvatarState('speaking');
  u.onend = ()=>{ if(!speechSynthesis.pending) setAvatarState('idle'); };
  speechSynthesis.cancel(); speechSynthesis.speak(u);
}
async function speak(text){
  if(!speakOn || !text){
    // Not speaking aloud: flash the speaking state briefly so the avatar
    // still visibly "says" her reply, then settle.
    setAvatarState('speaking');
    setTimeout(()=>{ if(avatarState === 'speaking') setAvatarState('idle'); }, 1600);
    return;
  }
  try{
    const r = await fetch('/tts',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});
    if(r.ok && r.status !== 204){
      const blob = await r.blob();
      if(herAudio){ try{herAudio.pause();}catch(e){} }
      if(herAudioUrl){ try{URL.revokeObjectURL(herAudioUrl);}catch(e){} }
      herAudioUrl = URL.createObjectURL(blob);
      herAudio = new Audio(herAudioUrl);
      herAudio.onplay = ()=>{
        const engine = r.headers.get('X-Alpecca-TTS-Engine') || 'server';
        const voice = r.headers.get('X-Alpecca-Voice') || 'af_heart';
        const style = r.headers.get('X-Alpecca-Voice-Style') || r.headers.get('X-Alpecca-Voice-Primary') || 'present';
        statusEl.textContent = `speaking with ${engine} / ${voice} / ${style}`;
        setAvatarState('speaking');
      };
      herAudio.onended = ()=>{ if(avatarState === 'speaking') setAvatarState('idle'); };
      await herAudio.play();
      return;
    }
    const why = r.headers.get('X-Alpecca-TTS-Error') || 'server voice unavailable';
    statusEl.textContent = `voice fallback: ${why}`;
  }catch(e){}
  speakBrowser(text);
}

// --- your voice: push-to-talk, transcribed locally on the server --------------
const micBtn = document.getElementById('micBtn');
let recorder = null, chunks = [], micStream = null, micRequest = null, micSequence = 0;

function resetMicrophoneUi(){
  micBtn.textContent = '\uD83C\uDFA4';
  micBtn.style.background = 'var(--bg-2)';
  micBtn.disabled = false;
}

function stopMicrophoneStream(){
  if(!micStream) return;
  for(const track of micStream.getTracks()){
    track.onended = null;
    track.stop();
  }
  micStream = null;
}

function cancelMicrophone(stopLease = true){
  micSequence++;
  if(micRequest){ micRequest.abort(); micRequest = null; }
  const activeRecorder = recorder;
  recorder = null;
  chunks = [];
  if(activeRecorder){
    activeRecorder.ondataavailable = null;
    activeRecorder.onstop = null;
    activeRecorder.onerror = null;
    if(activeRecorder.state !== 'inactive'){
      try { activeRecorder.stop(); } catch(e){}
    }
  }
  stopMicrophoneStream();
  resetMicrophoneUi();
  if(stopLease) void stopCapabilityLease('push_to_talk');
  setAvatarState('idle');
}

async function transcribeMicrophone(blob, lease, sequence){
  if(sequence !== micSequence){
    await stopCapabilityLease(lease);
    return;
  }
  if(!blob.size){
    await stopCapabilityLease(lease);
    statusEl.textContent = "couldn't hear any audio - try again";
    setAvatarState('idle');
    resetMicrophoneUi();
    return;
  }
  const request = new AbortController();
  micRequest = request;
  let leaseUsed = false;
  statusEl.textContent = 'listening to what you said...';
  setAvatarState('thinking');
  try {
    const headers = capabilityLeaseHeaders(lease);
    if(blob.type) headers.set('Content-Type', blob.type);
    const r = await fetch('/listen', {
      method: 'POST', headers, body: blob, signal: request.signal,
    });
    if(!r.ok) throw new Error('transcription rejected');
    releaseCapabilityLease(lease);
    leaseUsed = true;
    const d = await r.json();
    if(sequence !== micSequence) return;
    statusEl.textContent = '';
    if(d.heard && d.text){
      // Send the words through the exact same path as typed chat.
      addMsg(d.text, 'me');
      if(ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({
        text: d.text,
        private_perception: 'microphone',
      }));
      else setAvatarState('idle');
    } else {
      setAvatarState('idle');
      statusEl.textContent = "couldn't make that out - try again a little closer to the mic";
    }
  } catch(e){
    if(!leaseUsed) await stopCapabilityLease(lease);
    if(sequence !== micSequence || request.signal.aborted) return;
    setAvatarState('idle');
    statusEl.textContent = 'transcription failed - is the server running?';
  } finally {
    if(micRequest === request) micRequest = null;
    if(sequence === micSequence) resetMicrophoneUi();
  }
}

micBtn.addEventListener('click', async ()=>{
  if(recorder){
    if(recorder.state === 'recording'){
      micBtn.disabled = true;
      recorder.stop();   // -> onstop sends it
    }
    return;
  }
  if(micBtn.disabled) return;
  if(!navigator.mediaDevices?.getUserMedia || typeof MediaRecorder === 'undefined'){
    statusEl.textContent = 'microphone recording is not available in this browser';
    return;
  }
  const sequence = ++micSequence;
  micBtn.disabled = true;
  let lease = null;
  try {
    lease = await acquireCapabilityLease('push_to_talk');
    if(sequence !== micSequence){ await stopCapabilityLease(lease); return; }
    const stream = await navigator.mediaDevices.getUserMedia({audio: true});
    if(sequence !== micSequence || !capabilityLeaseIsUsable(lease, 'push_to_talk')){
      stream.getTracks().forEach(track=>track.stop());
      await stopCapabilityLease(lease);
      return;
    }
    micStream = stream;
    chunks = [];
    const activeRecorder = new MediaRecorder(stream);
    recorder = activeRecorder;
    activeRecorder.ondataavailable = e => {
      if(sequence === micSequence && recorder === activeRecorder && e.data.size) chunks.push(e.data);
    };
    activeRecorder.onerror = ()=>{
      if(sequence !== micSequence || recorder !== activeRecorder) return;
      cancelMicrophone(true);
      statusEl.textContent = 'microphone recording stopped unexpectedly';
    };
    activeRecorder.onstop = ()=>{
      activeRecorder.ondataavailable = null;
      activeRecorder.onstop = null;
      activeRecorder.onerror = null;
      if(sequence !== micSequence || recorder !== activeRecorder) return;
      const recordedChunks = chunks;
      const mimeType = activeRecorder.mimeType || 'audio/webm';
      recorder = null;
      chunks = [];
      stopMicrophoneStream();
      resetMicrophoneUi();
      micBtn.disabled = true;
      void transcribeMicrophone(new Blob(recordedChunks, {type: mimeType}), lease, sequence);
    };
    const audioTrack = stream.getAudioTracks()[0];
    if(audioTrack) audioTrack.onended = ()=>{
      if(sequence !== micSequence || recorder !== activeRecorder) return;
      cancelMicrophone(true);
      statusEl.textContent = 'microphone device became unavailable';
    };
    activeRecorder.start();
    micBtn.disabled = false;
    micBtn.textContent = '\u23F9'; micBtn.style.background = 'var(--alert)';
    setAvatarState('listening');
  } catch(e){
    if(lease) await stopCapabilityLease(lease);
    if(sequence !== micSequence) return;
    cancelMicrophone(false);
    statusEl.textContent = 'microphone unavailable, permission denied, or capability not granted';
  } finally {
    if(sequence === micSequence && !recorder && !micRequest) micBtn.disabled = false;
  }
});

// --- camera mode: show her something live ------------------------------------
const camOverlay = document.getElementById('camOverlay');
const camVideo = document.getElementById('camVideo');
const camBtn = document.getElementById('camBtn');
let camStream = null, camSequence = 0, cameraStarting = false;
function closeCam(stopLease = true){
  camSequence++;
  if(camStream){
    for(const track of camStream.getTracks()){
      track.onended = null;
      track.stop();
    }
    camStream = null;
  }
  camVideo.pause();
  camVideo.srcObject = null;
  camOverlay.style.display = 'none';
  return stopLease ? stopCapabilityLease('camera_frame') : Promise.resolve();
}
camBtn.addEventListener('click', async ()=>{
  if(cameraStarting || imageSendInProgress) return;
  if(!navigator.mediaDevices?.getUserMedia){
    statusEl.textContent = 'camera access is not available in this browser';
    return;
  }
  cameraStarting = true;
  camBtn.disabled = true;
  const closing = closeCam(true);
  const sequence = camSequence;
  let lease = null;
  try {
    await closing;
    if(sequence !== camSequence) return;
    lease = await acquireCapabilityLease('camera_frame');
    if(sequence !== camSequence){ await stopCapabilityLease(lease); return; }
    const stream = await navigator.mediaDevices.getUserMedia({video: {width: {ideal: 1280}}});
    if(sequence !== camSequence || !capabilityLeaseIsUsable(lease, 'camera_frame')){
      stream.getTracks().forEach(track=>track.stop());
      await stopCapabilityLease(lease);
      return;
    }
    camStream = stream;
    camVideo.srcObject = stream;
    camOverlay.style.display = 'flex';
    const videoTrack = stream.getVideoTracks()[0];
    if(videoTrack) videoTrack.onended = ()=>{
      if(sequence !== camSequence || camStream !== stream) return;
      void closeCam(true);
      statusEl.textContent = 'camera device became unavailable';
    };
    await camVideo.play();
  } catch(e){
    if(lease) await stopCapabilityLease(lease);
    if(sequence !== camSequence) return;
    await closeCam(false);
    statusEl.textContent = 'camera unavailable, permission denied, or capability not granted';
  } finally {
    cameraStarting = false;
    camBtn.disabled = false;
  }
});
document.getElementById('camCancel').addEventListener('click', ()=>void closeCam(true));
document.getElementById('camSnap').addEventListener('click', ()=>{
  const lease = capabilityLeases.get('camera_frame');
  let sent = false;
  if(!camStream || !ws || ws.readyState !== WebSocket.OPEN){
    void closeCam(true);
    return;
  }
  if(!capabilityLeaseIsUsable(lease, 'camera_frame')){
    void closeCam(true);
    statusEl.textContent = 'camera permission expired - open the camera again';
    return;
  }
  try {
    if(!camVideo.videoWidth || !camVideo.videoHeight){
      statusEl.textContent = 'camera is still preparing a frame';
      return;
    }
    const canvas = document.createElement('canvas');
    const scale = Math.min(1, 768 / Math.max(camVideo.videoWidth, camVideo.videoHeight));
    canvas.width = Math.round(camVideo.videoWidth * scale);
    canvas.height = Math.round(camVideo.videoHeight * scale);
    canvas.getContext('2d').drawImage(camVideo, 0, 0, canvas.width, canvas.height);
    const shot = canvas.toDataURL('image/jpeg', 0.85);
    void closeCam(false);
    const input = document.getElementById('input');
    const text = input.value.trim();
    sendLeasedImage({text, image: shot, source: 'camera'}, lease);
    sent = true;
    const d = document.createElement('div');
    d.className = 'msg me';
    if(text) d.textContent = text;
    const im = document.createElement('img'); im.src = shot;
    d.appendChild(im);
    log.appendChild(d); log.scrollTop = log.scrollHeight;
    input.value = '';
    setAvatarState('thinking');
  } catch(e){
    void closeCam(false);
    if(!sent) void stopCapabilityLease(lease);
    statusEl.textContent = 'camera frame could not be sent';
  }
});

// --- showing her images ------------------------------------------------------
// The file is downscaled in-browser (she doesn't need 12 megapixels to see a
// photo) and rides along with the next message as a data URL. The explicit Send
// action acquires one camera_frame lease for that one image.
let pendingImage = null, pendingImageSequence = 0, imageSendInProgress = false;
const attachChip = document.getElementById('attachChip');
const imageFile = document.getElementById('imageFile');
const formEl = document.getElementById('form');
const formSubmit = formEl.querySelector('button[type="submit"]');

function clearPendingImage(){
  pendingImageSequence++;
  pendingImage = null;
  attachChip.style.display = 'none';
  attachChip.textContent = '';
  imageFile.value = '';
}

function sendLeasedImage(payload, lease){
  if(!capabilityLeaseIsUsable(lease, 'camera_frame') ||
     !ws || ws.readyState !== WebSocket.OPEN ||
     capabilityConnection?.id !== lease.connectionId){
    throw new Error('Camera permission is no longer usable.');
  }
  const message = {
    ...payload,
    capability_lease: lease.token,
    capability_purpose: 'camera_frame',
    capability_connection: lease.connectionId,
  };
  ws.send(JSON.stringify(message));
  // The server owns the one-shot lease after a successful WebSocket send.
  releaseCapabilityLease(lease);
}
document.getElementById('attachBtn').addEventListener('click', ()=>
  imageFile.click());
imageFile.addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const sequence = ++pendingImageSequence;
  pendingImage = null;
  attachChip.style.display = 'none';
  const img = new Image();
  const objectUrl = URL.createObjectURL(file);
  img.onload = ()=>{
    try {
      if(sequence !== pendingImageSequence) return;
      const scale = Math.min(1, 768 / Math.max(img.width, img.height));
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      pendingImage = canvas.toDataURL('image/jpeg', 0.85);
      attachChip.style.display = 'block';
      attachChip.textContent = 'image attached - it will go with your next message';
    } catch(err){
      if(sequence === pendingImageSequence) statusEl.textContent = 'image could not be attached';
    } finally {
      URL.revokeObjectURL(objectUrl);
    }
  };
  img.onerror = ()=>{
    URL.revokeObjectURL(objectUrl);
    if(sequence === pendingImageSequence) statusEl.textContent = 'image could not be read';
  };
  img.src = objectUrl;
  e.target.value = '';
});

async function sendPendingImage(text){
  if(imageSendInProgress || !pendingImage || !ws || ws.readyState !== WebSocket.OPEN) return;
  if(cameraStarting){
    statusEl.textContent = 'wait for the current camera request to finish';
    return;
  }
  const image = pendingImage;
  const sequence = pendingImageSequence;
  imageSendInProgress = true;
  formSubmit.disabled = true;
  camBtn.disabled = true;
  let lease = null, sent = false;
  try {
    await closeCam(true);
    if(sequence !== pendingImageSequence || pendingImage !== image ||
       !ws || ws.readyState !== WebSocket.OPEN) return;
    statusEl.textContent = 'requesting image permission...';
    lease = await acquireCapabilityLease('camera_frame');
    if(sequence !== pendingImageSequence || pendingImage !== image){
      await stopCapabilityLease(lease);
      return;
    }
    sendLeasedImage({text, image}, lease);
    sent = true;
    statusEl.textContent = '';
    const d = document.createElement('div');
    d.className = 'msg me';
    if(text) d.textContent = text;
    const im = document.createElement('img'); im.src = image;
    d.appendChild(im);
    log.appendChild(d); log.scrollTop = log.scrollHeight;
    pendingImage = null;
    attachChip.style.display = 'none';
    document.getElementById('input').value = '';
    setAvatarState('thinking');
  } catch(e){
    if(lease && !sent) await stopCapabilityLease(lease);
    if(sequence === pendingImageSequence){
      statusEl.textContent = 'image permission was unavailable or the image could not be sent';
      setAvatarState('idle');
    }
  } finally {
    imageSendInProgress = false;
    formSubmit.disabled = false;
    camBtn.disabled = false;
  }
}

function clearLocalCapabilityState(){
  cancelMicrophone(true);
  void closeCam(true);
  clearPendingImage();
  imageSendInProgress = false;
  cameraStarting = false;
  formSubmit.disabled = false;
  camBtn.disabled = false;
  stopAllCapabilityLeases();
  statusEl.textContent = '';
  setAvatarState('idle');
}

formEl.addEventListener('submit', (e)=>{
  e.preventDefault();
  const input = document.getElementById('input');
  const text = input.value.trim();
  // "/do <task>" hands her the computer for a task instead of just chatting.
  if(text.startsWith('/do ')){
    const task = text.slice(4).trim();
    addMsg('/do ' + task, 'me'); input.value = '';
    setAvatarState('thinking');
    fetch('/computer/task', {method:'POST', headers:{'content-type':'application/json'},
      body: JSON.stringify({task})}).then(r=>r.json()).then(d=>{
        if(!d.ok){ statusEl.textContent = d.error || 'could not start'; setAvatarState('idle'); }
      }).catch(()=>{ statusEl.textContent='request failed'; setAvatarState('idle'); });
    return;
  }
  if((!text && !pendingImage) || ws.readyState !== 1) return;
  if(pendingImage){
    void sendPendingImage(text);
    return;
  }
  addMsg(text, 'me');
  ws.send(JSON.stringify({text})); input.value = '';
  setAvatarState('thinking');
});
</script>
