<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Her soft-tech app icon: the chest power-core emblem, glowing cyan on her
       deep-navy ground. Square + maskable-safe (the disc sits well inside the
       safe area). -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#0c1426"/>
      <stop offset="100%" stop-color="#070b14"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="42%" stop-color="#7fd9ff"/>
      <stop offset="100%" stop-color="#3aa9e0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="150" fill="url(#core)"/>
  <circle cx="256" cy="256" r="92" fill="none" stroke="#7fd9ff" stroke-width="10" opacity="0.9"/>
  <circle cx="256" cy="256" r="44" fill="#dff4ff"/>
</svg>
