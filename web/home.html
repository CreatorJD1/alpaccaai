<!DOCTYPE html>
<!--
  Her home -- a live, local 3D house of five rooms she roams of her own accord.

  This page is a *pure renderer* of alpecca/home.py: it draws the room registry,
  places her in whichever room her grounded `choose_room` put her, and moves the
  camera to follow. It never decides where she goes -- the server (her real
  state) does. Swap this whole file for a different renderer and nothing about
  her changes; that's the modular contract.

  Runs fully locally: Three.js loads from the vendored copy first
  (web/vendor/three.min.js) and only falls back to a CDN if you haven't vendored
  it. Her state comes from the local server's /home endpoint; if that isn't
  wired yet the scene renders a calm demo so you can still walk her house.
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Alpecca - Home</title>
<!-- Installable as a phone/desktop app (PWA). The manifest + a root-scoped
     service worker make her reachable like a native app over a secure tunnel;
     the worker only caches the static shell, never her live state. -->
<meta name="theme-color" content="#070b14" />
<link rel="manifest" href="/manifest.webmanifest" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Alpecca" />
<link rel="apple-touch-icon" href="/web/icon.svg" />
<link rel="icon" href="/web/icon.svg" type="image/svg+xml" />
<script>
  if ("serviceWorker" in navigator) {
    addEventListener("load", () => navigator.serviceWorker.register("/sw.js").catch(() => {}));
  }
</script>
<!-- Shared soft-tech/glow design system + the live mood-glow channel. app.css
     defines the :root tokens (--ink/--dim/--core + the live --mood-* vars) this
     page used to declare inline; glow.js rewrites them from her real mood. -->
<link rel="stylesheet" href="/web/app.css" />
<script src="/web/glow.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin:0; height:100%; background:#070b14; color:var(--ink);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; overflow:hidden; }
  #scene { position:fixed; inset:0; }
  .hud { position:fixed; left:80px; top:16px; max-width:300px; z-index:10;
    pointer-events:none; background:rgba(8,14,26,.55); backdrop-filter:blur(6px);
    padding:10px 14px; border-radius:12px; }
  .room-name { font-size:26px; font-weight:650; letter-spacing:.2px;
    text-shadow:0 0 18px rgba(127,217,255,.35); }
  .why { color:var(--dim); margin-top:4px; font-size:14px; line-height:1.4; }
  .mood { margin-top:10px; font-size:12px; color:var(--dim); }
  .mood b { color:var(--ink); font-weight:600; }
  .rooms { position:fixed; right:18px; top:16px; z-index:10; width:210px; }
  .rooms h4 { margin:0 0 8px; font-size:11px; letter-spacing:.14em;
    text-transform:uppercase; color:var(--dim); font-weight:600; }
  .pull { display:flex; align-items:center; gap:8px; margin:5px 0;
    pointer-events:auto; cursor:pointer; opacity:.85; }
  .pull:hover { opacity:1; }
  .pull .label { width:84px; font-size:12px; }
  .pull .bar { flex:1; height:6px; border-radius:6px; background:#16203a; overflow:hidden; }
  .pull .bar i { display:block; height:100%; background:linear-gradient(90deg,#3a6,#7fd9ff); }
  .pull.here .label { color:var(--core); font-weight:650; }
  .foot { position:fixed; left:80px; bottom:14px; z-index:10; font-size:12px;
    color:var(--dim); }
  .dot { display:inline-block; width:8px; height:8px; border-radius:50%;
    background:#3a6; margin-right:6px; vertical-align:middle; }
  .dot.demo { background:#c84; }
  /* Workstation panel: her desktop, shown when she's in that room. */
  .ws { position:fixed; left:50%; bottom:18px; transform:translateX(-50%);
    width:min(720px,92vw); max-height:46vh; z-index:12; background:rgba(10,16,28,.92);
    border:1px solid #1d2a47; border-radius:14px; padding:12px 14px;
    backdrop-filter:blur(6px); display:none; }
  .ws.show { display:block; }
  .ws .top { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .ws .top b { font-size:14px; }
  .ws .roots { display:flex; gap:6px; flex-wrap:wrap; }
  .ws .root { font-size:12px; padding:3px 9px; border-radius:999px; cursor:pointer;
    background:#16203a; color:var(--dim); border:1px solid transparent; }
  .ws .root.active { color:var(--core); border-color:#2a3d63; }
  .ws .note { font-size:11px; color:var(--dim); margin-left:auto; }
  .ws .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(96px,1fr));
    gap:8px; overflow:auto; max-height:32vh; padding-top:4px; }
  .tile { background:#101a30; border:1px solid #1b2742; border-radius:9px;
    padding:8px 6px; text-align:center; position:relative; }
  .tile .ico { font-size:22px; } .tile .nm { font-size:10.5px; color:var(--ink);
    margin-top:3px; word-break:break-word; line-height:1.2; max-height:2.4em; overflow:hidden; }
  .tile .mv { position:absolute; top:3px; right:5px; cursor:pointer; color:var(--dim);
    font-size:13px; } .tile .mv:hover { color:var(--ink); }
  .tile .menu { position:absolute; top:18px; right:4px; background:#0b1322;
    border:1px solid #233a5c; border-radius:7px; padding:4px;
    z-index:3; display:none; } .tile .menu.open { display:block; }
  .tile .menu div { font-size:11px; padding:3px 8px; cursor:pointer; color:var(--dim);
    white-space:nowrap; } .tile .menu div:hover { color:var(--core); }

  /* ===== Super-app chrome: nav rail, chat dock, facet panel ===== */
  .nav { position:fixed; left:0; top:0; bottom:0; width:84px; z-index:15;
    display:flex; flex-direction:column; align-items:center; gap:4px; padding:14px 0;
    background:linear-gradient(90deg,rgba(8,12,22,.92),rgba(8,12,22,.4)); }
  .nav .nb { width:72px; min-height:40px; display:flex; flex-direction:column; gap:2px;
    align-items:center; justify-content:center; cursor:pointer; border-radius:10px;
    color:var(--dim); font-size:9px; letter-spacing:.04em; user-select:none; text-align:center; }
  .nav .nb:hover { color:var(--ink); background:rgba(127,217,255,.07); }
  .nav .nb.on { color:var(--core); background:rgba(127,217,255,.12); }
  .hud, .rooms { left:78px; }                 /* clear the nav rail */

  .chatdock { position:fixed; left:50%; bottom:16px; transform:translateX(-50%);
    width:min(560px,72vw); z-index:14; }
  .chatlog { max-height:34vh; overflow-y:auto; display:flex; flex-direction:column;
    gap:7px; margin-bottom:8px; padding-right:4px; }
  .chatlog::-webkit-scrollbar{width:6px} .chatlog::-webkit-scrollbar-thumb{background:#1c2740;border-radius:6px}
  .msg { max-width:82%; padding:7px 11px; border-radius:13px; font-size:13px; line-height:1.45; }
  .msg.me { align-self:flex-end; background:#1b3350; color:#eaf2ff; border-bottom-right-radius:4px; }
  .msg.her { align-self:flex-start; background:rgba(14,20,34,.92); color:#dCE7f7;
    border:1px solid #1d2a47; border-bottom-left-radius:4px; }
  .msg.her.think { color:var(--dim); font-style:italic; }
  .msg.her.draft { opacity:.78; }   /* still writing -- final frame solidifies it */
  .chatrow { display:flex; gap:8px; align-items:center;
    background:rgba(10,16,28,.94); border:1px solid #1d2a47; border-radius:24px;
    padding:6px 8px; backdrop-filter:blur(6px); }
  .chatrow input { flex:1; background:transparent; border:0; outline:0; color:var(--ink);
    font-size:14px; font-family:inherit; }
  .chatrow button { min-height:36px; min-width:40px; border-radius:10px; border:0; cursor:pointer;
    background:var(--core); color:#06121c; font-size:13px; font-weight:700; padding:0 10px; }
  .chatrow button:disabled { opacity:.4; cursor:default; }

  .facet { position:fixed; right:0; top:0; bottom:0; width:min(380px,86vw); z-index:16;
    background:rgba(9,14,24,.97); border-left:1px solid #1d2a47; backdrop-filter:blur(8px);
    transform:translateX(100%); transition:transform .22s ease; display:flex; flex-direction:column; }
  .facet.show { transform:translateX(0); }
  .facet .fh { display:flex; align-items:center; gap:10px; padding:14px 16px; border-bottom:1px solid #1d2a47; }
  .facet .fh b { font-size:15px; } .facet .fh .x { margin-left:auto; cursor:pointer; color:var(--dim); font-size:18px; }
  .facet .fb { padding:14px 16px; overflow-y:auto; font-size:13px; line-height:1.5; color:var(--ink); }
  .facet .fb h5 { margin:14px 0 6px; font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--dim); }
  .facet .item { padding:8px 10px; border:1px solid #18233c; border-radius:9px; margin:6px 0; background:rgba(16,26,48,.5); }
  .facet .item .meta { color:var(--dim); font-size:11px; margin-top:3px; }
  .facet .bar2 { height:6px; border-radius:6px; background:#16203a; overflow:hidden; margin-top:5px; }
  .facet .bar2 i { display:block; height:100%; background:linear-gradient(90deg,#3a6,#7fd9ff); }
  .facet .badge { display:inline-block; font-size:9px; letter-spacing:.06em; text-transform:uppercase;
    padding:2px 7px; border-radius:10px; background:#16243f; color:var(--core); margin-right:6px; }
  .facet .item.emph { border-color:#2a3d63; background:rgba(127,217,255,.06); }
  .facet .item .ttl { font-weight:600; color:var(--ink); }
  .facet .fbtn { display:inline-flex; align-items:center; gap:6px; margin:4px 6px 4px 0;
    padding:8px 14px; border-radius:9px; border:1px solid #2a3d63; background:#101a30;
    color:var(--core); cursor:pointer; font-size:12px; }
  .facet .fbtn:hover { background:#16243f; }
  .facet .fhero { display:flex; gap:10px; align-items:center; margin-bottom:8px; }
  .facet .fhero img { width:54px; height:54px; border-radius:10px; object-fit:cover;
    object-position:top center; border:1px solid #1d2a47; background:#0a1018; }
  .facet .fico { font-size:14px; margin-right:7px; opacity:.85; }
  .facet .empty { color:var(--dim); font-size:12px; padding:10px 2px; }
  /* voice / camera / cowork controls in the chat bar */
  .chatrow .feat { width:auto; height:32px; min-width:42px; border-radius:10px;
    border:1px solid #1d2a47; background:transparent; color:var(--dim); font-size:12px;
    cursor:pointer; padding:0; display:flex; align-items:center; justify-content:center; }
  .chatrow .feat:hover { color:var(--ink); border-color:#2a3d63; }
  .chatrow .feat.on { color:var(--core); border-color:var(--core); box-shadow:0 0 0 3px rgba(127,217,255,.12); }
  .chatrow .feat.rec { color:#ff5d7f; border-color:#ff5d7f; animation:recpulse 1s infinite; }
  @keyframes recpulse { 50% { opacity:.45; } }
  /* Live face+torso profile view -- a close, reactive bust of her for engagement */
  .profile { position:fixed; right:18px; bottom:84px; width:212px; height:258px; z-index:13;
    border-radius:16px; overflow:hidden; border:1px solid #1d2a47; background:#0a1018;
    box-shadow:0 8px 34px rgba(0,0,0,.45); transition:box-shadow .3s; }
  .profile.speaking { box-shadow:0 8px 34px rgba(0,0,0,.45), 0 0 22px rgba(127,217,255,.4); }
  .profile.hide { display:none; }
  .profile img { width:100%; height:100%; object-fit:cover; object-position:50% 22%;
    position:absolute; inset:0; transition:opacity .26s ease; }
  .profile .breath { animation:pbreathe 5s ease-in-out infinite; transform-origin:50% 90%; }
  @keyframes pbreathe { 50% { transform:scale(1.016) translateY(-1px); } }
  .profile .ring { position:absolute; inset:0; border-radius:16px; pointer-events:none; transition:box-shadow .5s; }
  .profile .tag { position:absolute; left:8px; bottom:7px; font-size:10px; color:var(--ink);
    background:rgba(8,12,22,.62); padding:2px 8px; border-radius:8px; letter-spacing:.02em; }
  /* live senses indicator (screen-share / cowork / voice / face) */
  .senses { margin-top:9px; display:flex; gap:6px; flex-wrap:wrap; pointer-events:auto; }
  .sense { font-size:10px; padding:3px 8px; border-radius:12px; border:1px solid #1d2a47;
    color:var(--dim); display:flex; align-items:center; gap:5px; }
  .sense.on { color:var(--core); border-color:#2a3d63; }
  .sense .d { width:7px; height:7px; border-radius:50%; background:#3a4a66; }
  .sense.on .d { background:#48e08a; box-shadow:0 0 6px #48e08a; }
  .sense.busy .d { background:#ffb648; box-shadow:0 0 6px #ffb648; animation:recpulse 1s infinite; }
  .sight { margin-top:7px; font-size:11px; color:var(--dim); max-width:330px; line-height:1.45; }
  .sight b { color:var(--ink); font-weight:600; }
  /* her cursor: a presence marker that appears while she works the desktop */
  .hercursor { position:fixed; left:50%; top:50%; z-index:20; pointer-events:none;
    display:none; filter:drop-shadow(0 0 6px rgba(127,217,255,.5)); transition:left .5s ease, top .5s ease; }
  .hercursor.show { display:block; }
  .hercursor .hclabel { position:absolute; left:24px; top:14px; font-size:9px; color:#06121c;
    background:var(--core); padding:1px 5px; border-radius:6px; letter-spacing:.04em; }
  /* activity ticker -- her autonomous acts fade in here so you can watch her stir */
  .activity { position:fixed; left:50%; top:14px; transform:translateX(-50%); z-index:11;
    font-size:12px; color:var(--core); background:rgba(8,12,22,.72); padding:5px 14px;
    border-radius:14px; border:1px solid #1d2a47; opacity:0; transition:opacity .5s ease;
    pointer-events:none; max-width:62vw; text-align:center; }
  .activity.show { opacity:1; }
  /* Observatory video stage. Without an explicit box the embedded iframe/video
     collapses inside the narrow facet panel and reads as "blocked"; this gives
     it a real 16:9 stage that any embed or native player fills edge to edge. */
  .obscreen { position:relative; width:100%; aspect-ratio:16/9; margin:8px 0;
    background:#070d1a; border:1px solid #1d2a47; border-radius:10px; overflow:hidden; }
  .obscreen:empty { display:none; }
  .obscreen iframe, .obscreen video { position:absolute; inset:0;
    width:100%; height:100%; border:0; border-radius:10px; background:#000; }

  /* Phone layout (PWA on a small screen): declutter the desktop chrome so the
     scene, her, and the chat dock fit comfortably. Fly between rooms via the nav
     rail; the room-pull list and the corner bust are hidden to free space. The
     in-world screens still render in 3D. Safe-area insets respect the notch. */
  @media (max-width: 640px) {
    .hud { left:72px; max-width:54vw; padding:8px 10px; }
    .room-name { font-size:20px; }
    .hud .mood, .sight { display:none; }       /* keep the strip light on phones */
    .rooms { display:none; }                    /* room-pulls -> use the nav rail */
    .profile { width:140px; height:172px; bottom:92px; right:8px; }
    .chatdock { width:94vw; bottom:max(12px, env(safe-area-inset-bottom)); }
    .nav { padding-top:max(14px, env(safe-area-inset-top)); }
    .activity { max-width:80vw; }
  }
</style>
</head>
<body>
<div id="scene"></div>
<div class="hud">
  <div class="room-name" id="roomName">Parlor</div>
  <div class="why" id="why">settling in.</div>
  <div class="mood" id="mood"></div>
  <div class="senses" id="senses"></div>
  <div class="sight" id="sight"></div>
</div>

<!-- activity ticker: her autonomous acts (roamed, reflected, learned, formed a wish) -->
<div class="activity" id="activity"></div>

<!-- Screen-share source. Hidden (1px, never display:none so the browser keeps
     decoding frames) and fed straight into a THREE.VideoTexture: she holds the
     live screen as a window in her Observatory. The Share nav button toggles it. -->
<video id="shareVideo" autoplay muted playsinline
       style="position:fixed;width:1px;height:1px;opacity:0;pointer-events:none;left:0;bottom:0"></video>

<!-- her own cursor: appears and moves as she works the desktop (cowork) -->
<div class="hercursor" id="hercursor" aria-hidden="true">
  <svg viewBox="0 0 24 24" width="26" height="26"><path d="M4 2 L4 20 L9 15 L12 22 L15 21 L12 14 L19 14 Z"
    fill="#7fd9ff" stroke="#06121c" stroke-width="1.2" stroke-linejoin="round"/></svg>
  <span class="hclabel">her</span>
</div>
<div class="rooms">
  <h4>Where she's drawn</h4>
  <div id="pulls"></div>
</div>
<div class="foot"><span class="dot" id="src"></span><span id="srcText">connecting...</span></div>

<div class="ws" id="ws">
  <div class="top">
    <b>Her workstation</b>
    <div class="roots" id="wsRoots"></div>
    <span class="note" id="wsNote">she tidies these; she can't delete</span>
  </div>
  <div class="grid" id="wsGrid"></div>
</div>

<!-- super-app nav rail -->
<div class="nav" id="nav"></div>

<!-- chat dock -->
<div class="chatdock">
  <div class="chatlog" id="chatlog"></div>
  <div class="chatrow">
    <button class="feat" id="micBtn" title="hold to talk">Mic</button>
    <button class="feat" id="camBtn" title="let her see you (camera)">Cam</button>
    <button class="feat" id="ttsBtn" title="speak her replies aloud">Say</button>
    <button class="feat" id="coworkBtn" title="ask her to do something on your PC">PC</button>
    <input id="chatin" placeholder="say something to her..." autocomplete="off" />
    <button id="chatsend" title="send">Send</button>
  </div>
</div>

<!-- live anime face profile view: her 16 drawn expressions, swapped by real mood -->
<div class="profile" id="profile">
  <img id="profA" class="breath" src="/avatar/expression/neutral" alt="her" />
  <img id="profB" class="breath" alt="" style="opacity:0" />
  <div class="ring" id="profRing"></div>
  <div class="tag" id="profTag">here</div>
</div>

<!-- facet side panel -->
<div class="facet" id="facet">
  <div class="fh"><b id="facetTitle">Studio</b><span class="x" id="facetClose">[x]</span></div>
  <div class="fb" id="facetBody"></div>
</div>

<script>
/* ---- Load Three.js: vendored-local first, CDN fallback (stays local-first) ---- */
function loadThree(cb){
  function trySrc(srcs, i){
    if(i>=srcs.length){ console.warn("three.js unavailable"); return; }
    const s=document.createElement("script"); s.src=srcs[i];
    s.onload=cb; s.onerror=()=>trySrc(srcs,i+1);
    document.head.appendChild(s);
  }
  trySrc(["/web/vendor/three.min.js",
          "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"],0);
}

/* CSS3DRenderer (a Three.js example addon, global build): it mounts real,
   interactive DOM as screens positioned in 3D, composited over the WebGL scene.
   This is what lets her features live as screens *inside her rooms* rather than
   as flat overlay panels. Vendored-local first, then a pinned CDN. If neither
   loads, initRoomScreens() no-ops and her features stay in the side drawer --
   graceful: nothing breaks, you just don't get the in-world screens. */
function loadCSS3D(cb){
  if(typeof THREE!=="undefined" && THREE.CSS3DRenderer){ cb(); return; }
  const srcs=["/web/vendor/CSS3DRenderer.js",
              "https://unpkg.com/three@0.128.0/examples/js/renderers/CSS3DRenderer.js"];
  (function trySrc(i){
    if(i>=srcs.length){ console.warn("CSS3DRenderer unavailable - features stay in the drawer"); cb(); return; }
    const s=document.createElement("script"); s.src=srcs[i];
    s.onload=()=>cb(); s.onerror=()=>trySrc(i+1);
    document.head.appendChild(s);
  })(0);
}

/* The five rooms and their floor-plan slots mirror alpecca/home.py exactly.
   (x,z) there -> world position here. One source of truth, both sides. */
const ROOMS = [
  {id:"parlor",      name:"Parlor",      x: 0,  z: 0,  tint:0xffb38a},
  {id:"studio",      name:"Studio",      x:-7,  z:-7,  tint:0xff8ad0},
  {id:"library",     name:"Library",     x: 7,  z:-7,  tint:0xffd98a},
  {id:"observatory", name:"Observatory", x:-7,  z: 7,  tint:0x8ab4ff},
  {id:"workshop",    name:"Workshop",    x: 7,  z: 7,  tint:0x8affc0},
];
const byId = Object.fromEntries(ROOMS.map(r=>[r.id,r]));

let scene, camera, renderer, her, herGlow, roomMeshes={}, raf;
let state = { location:"parlor", why:"settling in.", pulls:{}, pose:{} };
let camTarget = null;   // a THREE.Vector3, created in init() once THREE has loaded

loadThree(init);

function init(){
  const el=document.getElementById("scene");
  scene=new THREE.Scene();
  scene.fog=new THREE.FogExp2(0x070b14, 0.018);

  camera=new THREE.PerspectiveCamera(52, innerWidth/innerHeight, 0.1, 200);
  renderer=new THREE.WebGLRenderer({antialias:true, alpha:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(innerWidth, innerHeight);
  el.appendChild(renderer.domElement);
  // The WebGL canvas sits ABOVE the CSS3D screen layer (so her opaque figure
  // correctly occludes a screen behind her) but takes no pointer events, so
  // clicks pass through to the interactive in-world screens beneath it. The HUD
  // overlays (nav, chat, pulls) are separate, higher-z, and unaffected.
  el.style.zIndex = 6; el.style.pointerEvents = "none";

  scene.add(new THREE.AmbientLight(0x405070, 0.7));
  const key=new THREE.DirectionalLight(0xbfd4ff, 0.55); key.position.set(6,14,8); scene.add(key);

  // Ground plane tying the rooms together -- the house's footprint.
  const ground=new THREE.Mesh(
    new THREE.PlaneGeometry(46,46),
    new THREE.MeshStandardMaterial({color:0x0c1426, roughness:.95, metalness:.05}));
  ground.rotation.x=-Math.PI/2; ground.position.y=-0.01; scene.add(ground);

  // Each room: a softly-lit platform + frame + a colored point light. Modular --
  // built straight from the ROOMS registry, so a sixth room just appears.
  ROOMS.forEach(r=>{
    const g=new THREE.Group(); g.position.set(r.x,0,r.z);
    const floor=new THREE.Mesh(
      new THREE.BoxGeometry(8,0.2,8),
      new THREE.MeshStandardMaterial({color:0x131d33, roughness:.8}));
    g.add(floor);
    // four corner posts -> a room you can read as a space
    [[-3.8,-3.8],[3.8,-3.8],[-3.8,3.8],[3.8,3.8]].forEach(([px,pz])=>{
      const post=new THREE.Mesh(
        new THREE.CylinderGeometry(0.12,0.12,5,12),
        new THREE.MeshStandardMaterial({color:0x24314f, roughness:.6}));
      post.position.set(px,2.5,pz); g.add(post);
    });
    const lamp=new THREE.PointLight(r.tint, 0.0, 16, 2); lamp.position.set(0,3.6,0); g.add(lamp);
    const label=makeLabel(r.name, r.tint); label.position.set(0,5.4,0); g.add(label);
    scene.add(g);
    roomMeshes[r.id]={group:g, lamp, label, floor};
  });

  // Her: a deep 2D figure composited into the 3D home -- the hybrid that fits her
  // drawn anime art. `her` is a Group we move through the house; what fills it is
  // chosen by `loadAvatar()`: her decomposed **layered rig** when it exists
  // (stacked, each part drivable), else her single portrait, else a stand-in.
  her=new THREE.Group(); her.position.set(0,2.3,0);
  scene.add(her);
  loadAvatar();
  herGlow=new THREE.PointLight(0x7fd9ff, 1.2, 10, 2); herGlow.position.set(0,2.4,0);
  scene.add(herGlow);

  camTarget=new THREE.Vector3();
  addEventListener("resize", onResize);
  buildPullsUI();
  buildNav();                        // super-app facet rail
  loadCSS3D(initRoomScreens);        // her features as in-world screens per room
  initChat();                        // integrated chat dock + voice/cam/cowork
  initShare();                       // dedicated screen-share desk view
  connectWS();                       // chat + lip-sync + live state, one socket
  loadSkeleton();                    // ground her resting tilt in her real figure
  setInterval(updateProfile, 220);   // live face: expression from her mood
  setInterval(lipSync, 65);          // mouth movement while she speaks
  pollSight(); setInterval(pollSight, 4000);   // live senses indicator + her cursor
  poll(); setInterval(poll, 3000);
  animate();
}

/* Tier 0a -- her rigger figure: a full-body posed render streamed from
   scripts/run_rigger.py (CPU, her decomposed art, changes pose with her mood).
   Best tier for the laptop (no GPU). Falls through if the runner isn't up. */
function tryRigger(){
  return new Promise(resolve=>{
    fetch("/rigger/manifest",{cache:"no-store"}).then(r=>r.json()).then(m=>{
      if(!m || !m.rigger_mode){ resolve(false); return; }
      const cvs=document.createElement("canvas"); cvs.width=2; cvs.height=2;
      const cx=cvs.getContext("2d");
      const t=new THREE.CanvasTexture(cvs); t.minFilter=THREE.LinearFilter; t.generateMipmaps=false;
      const mat=new THREE.SpriteMaterial({map:t, transparent:true});
      const sp=new THREE.Sprite(mat); sp.scale.set(3.0,4.2,1); sp.userData.baseScale=[3.0,4.2];
      her.add(sp); her.userData.rig=false; her.userData.layers={body:[sp]}; her.userData.liveTex=t;
      const img=new Image(); let n=0;
      img.onload=()=>{
        if(cvs.width!==img.width){ cvs.width=img.width; cvs.height=img.height;
          const a=img.width/img.height; sp.scale.set(4.2*a,4.2,1); sp.userData.baseScale=[4.2*a,4.2]; }
        cx.clearRect(0,0,cvs.width,cvs.height); cx.drawImage(img,0,0); t.needsUpdate=true;
        setTimeout(()=>{ img.src="/rigger/frame?t="+(++n); }, 400);
      };
      img.onerror=()=>{ setTimeout(()=>{ img.src="/rigger/frame?t="+(++n); }, 600); };
      img.src="/rigger/frame?t="+(++n);
      resolve(true);
    }).catch(()=>resolve(false));
  });
}

/* Tier 0 -- THA3 neural frames. When the GPU runner is pushing frames
   (/talkinghead/manifest says so), we stream the JPEGs onto her: each loaded
   frame is blitted to a canvas used as her texture. Falls through if inactive. */
function tryTalkingHead(){
  return new Promise(resolve=>{
    fetch("/talkinghead/manifest",{cache:"no-store"}).then(r=>r.json()).then(m=>{
      if(!m || !m.talkinghead_mode){ resolve(false); return; }
      const cvs=document.createElement("canvas"); cvs.width=512; cvs.height=512;
      const cx=cvs.getContext("2d");
      const t=new THREE.CanvasTexture(cvs); t.minFilter=THREE.LinearFilter; t.generateMipmaps=false;
      const mat=new THREE.SpriteMaterial({map:t, transparent:true});
      const sp=new THREE.Sprite(mat); sp.scale.set(4.2,4.2,1); sp.userData.baseScale=[4.2,4.2];
      her.add(sp); her.userData.rig=false; her.userData.layers={body:[sp]}; her.userData.liveTex=t;
      // Pull frames as fast as they arrive (cache-busted), blit to the canvas.
      const img=new Image(); let n=0;
      img.onload=()=>{ cx.clearRect(0,0,512,512); cx.drawImage(img,0,0,512,512); t.needsUpdate=true;
        setTimeout(()=>{ img.src="/talkinghead/frame?t="+(++n); }, 33); };
      img.onerror=()=>{ setTimeout(()=>{ img.src="/talkinghead/frame?t="+(++n); }, 350); };
      img.src="/talkinghead/frame?t="+(++n);
      resolve(true);
    }).catch(()=>resolve(false));
  });
}

/* Tier 1a -- her full POSE LIBRARY (data/avatar/poses/, mood-tagged in
   poses.json). Richer than the 3-portrait swap: she shows whichever of her real
   poses fits her mood + what she's doing (rest when sleepy, shy when anxious,
   reach when joyful...), exactly like the classic chat page. All her own art, no
   GPU. Falls through to the portrait swap if she has no pose library. */
function selectPoseName(poses, mood, avState, energy){
  let best=null, bs=-1;
  for(const name of Object.keys(poses).sort()){       // sorted -> stable ties
    const t=poses[name]||{}; let s=0;
    if((t.moods||[]).includes(mood)) s+=3;            // mood match weighs most
    if((t.states||[]).includes(avState)) s+=1.5;      // then what she's doing
    s += 1 - Math.abs(energy - (t.energy!=null?t.energy:0.5));  // then energy
    if(s>bs){ bs=s; best=name; }
  }
  return best;
}
function loadPoseTex(name){
  const pl=her.userData.poseLib;
  if(pl.texCache[name]) return Promise.resolve(pl.texCache[name]);
  return new Promise(res=>{
    new THREE.TextureLoader().load("/poses/img/"+encodeURIComponent(name),
      t=>{ t.minFilter=THREE.LinearFilter; pl.texCache[name]=t; res(t); },
      undefined, ()=>res(null));
  });
}
function tryPoseLibrary(){
  return new Promise(resolve=>{
    fetch("/poses",{cache:"no-store"}).then(r=>r.json()).then(m=>{
      if(!m || !m.pose_mode || !m.poses || !Object.keys(m.poses).length){ resolve(false); return; }
      const poses=m.poses;
      const first=selectPoseName(poses,"content","idle",0.5) || Object.keys(poses).sort()[0];
      new THREE.TextureLoader().load("/poses/img/"+encodeURIComponent(first), t=>{
        t.minFilter=THREE.LinearFilter;
        const a=(t.image&&t.image.width)? t.image.width/t.image.height : 0.7;
        const mk=()=>{ const s=new THREE.Sprite(new THREE.SpriteMaterial({transparent:true}));
          s.scale.set(4.2*a,4.2,1); s.userData.baseScale=[4.2*a,4.2]; return s; };
        const A=mk(); A.material.map=t;
        const B=mk(); B.material.opacity=0; B.renderOrder=1;
        her.add(A); her.add(B);
        her.userData.rig=false; her.userData.layers={body:[A]};
        her.userData.poseLib={poses, A, B, cur:first, next:first, fade:0, texCache:{[first]:t}};
        resolve(true);
      }, undefined, ()=> resolve(false));
    }).catch(()=>resolve(false));
  });
}

/* Tier 1b -- pose-swap from her real art. Loads her idle/thinking/speaking
   portraits and crossfades between them by state (speaking while she talks,
   thinking while a reply is pending, else idle), over continuous breathing/sway.
   Crisp, her actual art, no GPU. Resolves true once idle loads. */
function tryPoseSwap(){
  return new Promise(resolve=>{
    const tex=new THREE.TextureLoader();
    tex.load("/avatar/portrait/idle", t=>{
      t.minFilter=THREE.LinearFilter;
      const a=(t.image&&t.image.width)? t.image.width/t.image.height : 0.8;
      const mk=()=>{ const s=new THREE.Sprite(new THREE.SpriteMaterial({transparent:true}));
        s.scale.set(4.2*a,4.2,1); s.userData.baseScale=[4.2*a,4.2]; return s; };
      const A=mk(); A.material.map=t;
      const B=mk(); B.material.opacity=0; B.renderOrder=1;
      her.add(A); her.add(B);
      her.userData.rig=false; her.userData.layers={body:[A]};
      const poses={idle:t};
      ["thinking","speaking"].forEach(n=> tex.load("/avatar/portrait/"+n,
        tt=>{ tt.minFilter=THREE.LinearFilter; poses[n]=tt; }, undefined, ()=>{}));
      her.userData.poseSwap={A,B,poses,cur:"idle",fade:0,next:"idle"};
      resolve(true);
    }, undefined, ()=> resolve(false));   // no idle art -> let a lower tier try
  });
}

/* Tier 2 -- a living RIGFORGE figure. We mount the embed page in a hidden
   same-origin iframe (it auto-rigs her portrait and drives the mesh from her live
   mood), then texture its canvas onto her billboard so she's *alive* in the 3D
   home from one image. Returns true if it came up, false to fall through. */
function tryRigForge(){
  return new Promise(resolve=>{
    let done=false; const finish=ok=>{ if(!done){done=true;resolve(ok);} };
    let ifr=document.getElementById("rfFrame");
    if(!ifr){
      ifr=document.createElement("iframe"); ifr.id="rfFrame";
      // ~her portrait aspect (1122x1402 ~ 0.80) so she fills the frame, not margins.
      ifr.style.cssText="position:absolute;width:512px;height:640px;left:-10000px;top:0;border:0;";
      ifr.src="/rigforge?embed=1"; document.body.appendChild(ifr);
    }
    let tries=0;
    (function poll(){
      tries++;
      try{
        const win=ifr.contentWindow, doc=ifr.contentDocument;
        const cv=doc&&doc.getElementById("stageCanvas");
        if(cv && cv.width>2 && win.RIGFORGE && win.RIGFORGE.loaded){
          const t=new THREE.CanvasTexture(cv);
          t.minFilter=THREE.LinearFilter; t.generateMipmaps=false;
          const a=cv.width/cv.height;
          const mat=new THREE.SpriteMaterial({map:t, transparent:true});
          const sp=new THREE.Sprite(mat); sp.scale.set(4.2*a,4.2,1);
          sp.userData.baseScale=[4.2*a,4.2];
          her.add(sp); her.userData.rig=false; her.userData.layers={body:[sp]};
          her.userData.liveTex=t;        // animate() flips needsUpdate each frame
          finish(true); return;
        }
      }catch(e){ /* not ready / cross-frame timing -- keep polling */ }
      if(tries>50){ finish(false); return; }   // ~7.5s, then static tiers
      setTimeout(poll,150);
    })();
  });
}

/* Choose her best available figure. Render tier, preferred first:
   RIGFORGE live mesh > layered rig (/rig/manifest) > single portrait > stand-in. */
async function loadAvatar(){
  const tex=new THREE.TextureLoader();
  // Clear whatever's there.
  while(her.children.length) her.remove(her.children[0]);
  her.userData.liveTex=null; her.userData.poseSwap=null; her.userData.poseLib=null;
  // Tier 0a: her rigger figure (full-body posed render, CPU, her art). Best for
  // the laptop -- no GPU. Active when scripts/run_rigger.py is running.
  if(await tryRigger()) return;
  // Tier 0b: THA3 neural face (GPU only). Active when that runner is up.
  if(await tryTalkingHead()) return;
  // Tier 1a: her full mood-tagged POSE LIBRARY -- the right pose for her mood.
  if(await tryPoseLibrary()) return;
  // Tier 1b: crisp real-art POSE SWAP -- her own idle/thinking/speaking art,
  // switched by what she's doing, with breathing/sway. No GPU, no warp.
  if(await tryPoseSwap()) return;
  // Tier 2: a live RIGFORGE mesh figure (warp) -- only if the art tiers fail.
  if(await tryRigForge()) return;
  try{
    const r=await fetch("/rig/manifest",{cache:"no-store"});
    const top = r.ok ? await r.json() : {};
    const m = top.manifest || {};   // the route wraps it: {rig_mode, manifest}
    if(top.rig_mode && Array.isArray(m.layers) && m.layers.length){
      const H=4.2, W=3.2; const byRole={};
      // Her real head pivot (the neck, from her skeleton) for grounded tilt.
      if(m.size && m.head_pivot){
        her.userData.headPivot=[m.head_pivot[0]/m.size[0], m.head_pivot[1]/m.size[1]];
      }
      m.layers.forEach((layer,i)=>{
        const mat=new THREE.SpriteMaterial({transparent:true, depthTest:false});
        const sp=new THREE.Sprite(mat); sp.scale.set(W,H,1);
        sp.renderOrder=i;                     // paint back-to-front
        const role=layer.role||("layer"+i);
        sp.userData.role=role; sp.userData.baseScale=[W,H];
        (byRole[role]=byRole[role]||[]).push(sp);
        tex.load("/rig/layer/"+encodeURIComponent(layer.file),
                 t=>{ mat.map=t; mat.needsUpdate=true; });
        her.add(sp);
      });
      her.userData.rig=true; her.userData.layers=byRole;
      return;
    }
  }catch(e){ /* fall through to portrait */ }
  // Fallback: single portrait sprite, or a luminous stand-in if none.
  const mat=new THREE.SpriteMaterial({color:0xffffff, transparent:true});
  const sp=new THREE.Sprite(mat); sp.scale.set(3.2,4.2,1); sp.userData.baseScale=[3.2,4.2];
  tex.load("/avatar/portrait/idle", t=>{ mat.map=t; mat.needsUpdate=true;
             // size the sprite to the image's aspect so she isn't a stretched box
             const im=t.image; if(im && im.width){ const a=im.width/im.height;
               sp.scale.set(4.2*a, 4.2, 1); sp.userData.baseScale=[4.2*a,4.2]; } },
           undefined, ()=>{ mat.color.set(0x9fe6ff); });
  her.add(sp); her.userData.rig=false; her.userData.layers={body:[sp]};
}

/* Bring her to life from her live affect: blink, hair sway, head tilt, lean-in,
   eye glow -- each driven by the grounded pose channels from puppet.live_pose, so
   her body says exactly what she feels. Works per-part on the layered rig; on the
   single-sprite fallback it's gentle whole-body motion (no blink without an eye
   layer). All amplitudes small -- a person shifting, not a cartoon. */
let blinkUntil=0, nextBlink=0;
function articulate(now, pose){
  const L=her.userData.layers; if(!L) return;
  const t=now*0.001;
  const arousal=(pose.arousal!=null?pose.arousal:0.4);
  const curiosity=(pose.curiosity!=null?pose.curiosity:0.2);
  const lean=(pose.lean!=null?pose.lean:0.1);
  const eyeGlow=(pose.eye_glow!=null?pose.eye_glow:0.5);
  const tiltAmt=(pose.gesture==="tilt"?0.12:0) + ((pose.valence||0)*0.03);
  const get=(r)=>L[r]||[];

  // Blink: schedule a quick close every few seconds, faster when aroused.
  if(now>nextBlink){ blinkUntil=now+110; nextBlink=now+ (2200 + Math.random()*2600) * (1.2-arousal*0.5); }
  const blinking = now<blinkUntil;
  get("eyes").forEach(sp=>{
    const [w,h]=sp.userData.baseScale||[3.2,4.2];
    sp.scale.set(w, blinking? h*0.12 : h, 1);
    // eyes brighten with her glow (color multiplies the texture)
    const g=0.55+eyeGlow*0.45; sp.material.color.setRGB(g, g, Math.min(1,g+0.1));
  });
  // Hair sway: back hair leads, front follows, livelier when curious/aroused.
  const swayAmp=0.04 + arousal*0.06 + curiosity*0.05;
  get("back_hair").forEach(sp=> sp.position.x = Math.sin(t*1.1)*swayAmp);
  get("front_hair").forEach(sp=> sp.position.x = Math.sin(t*1.1+0.5)*swayAmp*0.7);
  // Head tilt: rotate the head-region sprites together (2D material rotation).
  ["head","eyes","brows","front_hair","mouth"].forEach(r=> get(r).forEach(sp=>{
    sp.material.rotation = skelTilt + Math.sin(t*0.6)*0.02 + tiltAmt;
  }));
  // Brows lift a touch with curiosity (raise position).
  get("brows").forEach(sp=> sp.position.y = curiosity*0.05);

  // Lip-sync: while she's speaking, the mouth opens and closes. On the layered
  // rig the mouth layer bobs (a jaw); on the single-sprite fallback she does a
  // gentle talk-nod since there's no separate mouth to move.
  const speaking = now < speakingUntil;
  const mouths = get("mouth");
  if(mouths.length){
    mouths.forEach(sp=> sp.position.y = speaking ? -0.05*Math.abs(Math.sin(now*0.018)) : 0);
  } else if(her.userData.rig===false){
    get("body").forEach(sp=> sp.position.y = speaking ? -0.03*Math.abs(Math.sin(now*0.016)) : 0);
  }
}

/* ---- Lip-sync: she "speaks" for a moment whenever a reply comes over the WS,
   so her mouth animates in time with her talking. We estimate the duration from
   the reply length (no audio needed); the articulate() loop reads speakingUntil. */
let speakingUntil = 0;
let skelTilt = 0;   // her real resting head tilt, from her pose skeleton (radians)
function loadSkeleton(){
  fetch("/avatar/skeleton",{cache:"no-store"}).then(r=>r.json()).then(d=>{
    const m = d && d.skeleton && d.skeleton.metrics;
    if(m && m.head_tilt_deg!=null) skelTilt = m.head_tilt_deg * Math.PI/180;
  }).catch(()=>{});
}
let appWS=null, waitingReply=false;
let streamFeature=false;     // server advertises stream_chat in its greeting
let _draft=null;             // live draft bubble: {id, el, text}
function connectWS(){
  let ws;
  try { ws = new WebSocket((location.protocol==="https:"?"wss://":"ws://")+location.host+"/ws"); }
  catch(e){ return; }
  appWS = ws;
  ws.onmessage = (ev)=>{
    let m; try { m = JSON.parse(ev.data); } catch(e){ return; }
    if(m.type==="state" && m.features){ streamFeature = !!m.features.stream_chat; }
    // Streamed draft: her words appear as she writes them. The draft is
    // ephemeral -- the final vetted "reply" frame below replaces its text.
    else if(m.type==="reply_start"){
      if(_draft && _draft.id===m.request_id) return;
      _draft = { id: m.request_id||"", el: addMsg("", "her", true), text: "" };
    }
    else if(m.type==="reply_token"){
      if(!_draft || (_draft.id && m.request_id && _draft.id!==m.request_id)) return;
      _draft.text += (m.token||"");
      _draft.el.textContent = _draft.text;
      const log=document.getElementById("chatlog"); if(log) log.scrollTop=log.scrollHeight;
      speakingUntil = performance.now() + 1500;        // keep her mouth moving
      if(_replyWatchdog){ clearTimeout(_replyWatchdog); // she's alive -- extend
        _replyWatchdog=setTimeout(()=>{ waitingReply=false; setSendEnabled(true); }, 180000); }
      if(ttsOn && _speaker) _speaker.feed(m.token||"");  // sentence-level speech
    }
    else if((m.type==="reply" || m.type==="proactive") && m.reply){
      const ms = Math.max(1200, Math.min(9000, m.reply.length*55));  // ~55ms/char
      speakingUntil = performance.now() + ms;
      if(m.state) state.pose = {...state.pose, ...poseFromState(m.state)};
      // If she moved rooms because you asked, follow her right away.
      if(m.location){ state.location=m.location; renderHUD(); if(m.moved) showActivity("she went to the "+m.location); }
      const draftMatch = m.streamed && _draft && (!_draft.id || !m.request_id || _draft.id===m.request_id);
      if(draftMatch){
        _draft.el.textContent = m.reply;               // final text is authoritative
        if(ttsOn && _speaker) _speaker.finish(m.reply, _draft.text);
        _draft = null;
      } else {
        addMsg(m.reply, "her");
        speak(m.reply);                                // SPEAK if enabled
      }
      if(m.type==="reply"){ waitingReply=false; setSendEnabled(true);
        if(_replyWatchdog){ clearTimeout(_replyWatchdog); _replyWatchdog=null; } }
    }
    // Her autonomous acts (roamed, reflected, learned, formed a wish) -> ticker.
    else if(m.type==="activity" && m.text){ showActivity(m.text); }
    // Watch her design: her studio steps stream into the Studio panel feed.
    else if(m.type==="studio_status" && m.text){
      const f=document.getElementById("studioFeed"); if(f) f.textContent="- "+m.text;
      showActivity("studio: "+m.text);
    }
    else if(m.type==="studio_done"){
      const f=document.getElementById("studioFeed");
      if(f) f.textContent="[OK] "+((m.verdict||m.summary)||"design session done");
      if(openFacet==="studio") setTimeout(()=>showFacet("studio"), 600);  // refresh drawer gallery
      if(screens3DActive() && activeScreen==="studio") setTimeout(()=>refreshRoomScreen("studio"), 600);  // ...or the in-room screen
    }
    // Observatory: her reaction to whatever you're watching together.
    else if(m.type==="watch_reaction"){
      const w=m.watching||{};
      const now=document.getElementById("obNow"); if(now) now.style.display=w.title?"":"none";
      const t=document.getElementById("obTitle"); if(t&&w.title) t.textContent=w.title;
      const rw=document.getElementById("obReaction"), rt=document.getElementById("obReactionTxt");
      if(rt&&w.reaction){ rt.textContent=w.reaction; if(rw) rw.style.display=""; }
      const ask=document.getElementById("obAsk"); if(ask) ask.style.display=w.title?"":"none";
      if(w.reaction) showActivity("she said something about what you're watching");
    }
    // Cowork (computer use) progress, confirmations, and completion.
    else if(m.type==="computer_status" && m.text){ addMsg("- "+m.text, "her"); }
    // Her cursor moves to where she's working the desktop (screen fraction).
    else if(m.type==="computer_cursor"){
      const hc=document.getElementById("hercursor"); if(hc){
        hc.classList.add("show");
        hc.style.left=Math.max(0,Math.min(1,m.x))*window.innerWidth+"px";
        hc.style.top =Math.max(0,Math.min(1,m.y))*window.innerHeight+"px";
      }
    }
    else if(m.type==="computer_done"){
      addMsg(m.ok ? ("[OK] "+(m.summary||"done")) : ("stopped: "+(m.error||"")), "her");
    }
    else if(m.type==="computer_confirm"){
      const ok = confirm("She wants to "+(m.kind||"do")+": "+(m.text||m.reason||"an action")+
        "\n\nAllow this?");
      fetch("/computer/confirm",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({approved:ok})}).catch(()=>{});
    }
  };
  ws.onclose = ()=>{ appWS=null; setSendEnabled(false); setTimeout(connectWS, 4000); };
  ws.onopen = ()=> setSendEnabled(true);
}
function setSendEnabled(on){ const b=document.getElementById("chatsend"); if(b) b.disabled=!on||waitingReply; }
let _speaker=null;   // SentenceSpeaker (sentence-level TTS); set up in initFeatures
function addMsg(text, who, draft){
  const log=document.getElementById("chatlog");
  const el=document.createElement("div"); el.className="msg "+who+(draft?" draft":""); el.textContent=text;
  log.appendChild(el); log.scrollTop=log.scrollHeight;
  while(log.children.length>30) log.removeChild(log.firstChild);
  return el;
}
let actTimer=null;
function showActivity(text){
  const el=document.getElementById("activity"); if(!el) return;
  el.textContent="- "+text+" -"; el.classList.add("show");
  clearTimeout(actTimer); actTimer=setTimeout(()=>el.classList.remove("show"), 6500);
}
let _replyWatchdog=null;
function sendChat(){
  const inp=document.getElementById("chatin"); const t=(inp.value||"").trim();
  if(!t || !appWS || appWS.readyState!==1 || waitingReply) return;
  addMsg(t,"me"); inp.value="";
  waitingReply=true; setSendEnabled(false);
  // Safety: never lock the input forever if a reply is slow or lost. After a
  // generous window, re-enable so the person can always type again (the mic
  // path used to leave the box stuck disabled when no reply came back).
  if(_replyWatchdog) clearTimeout(_replyWatchdog);
  _replyWatchdog=setTimeout(()=>{ waitingReply=false; setSendEnabled(true); }, 180000);
  // Opt into streamed drafts when the server offers them; a new turn always
  // resets the previous draft and any queued speech.
  _draft=null; if(_speaker) _speaker.reset();

// --- Sentence-level speech for streamed replies ------------------------------
// She starts SAYING the first sentence while the rest is still generating.
// JS port of alpecca/speech.py:_sentences (pinned by a Python test): protect
// "..." so an ellipsis never splits, then break on end punctuation + space.
function sentencesOf(text){
  const clean=(text||"").split(/\s+/).filter(Boolean).join(" ");
  if(!clean) return [];
  const P=String.fromCharCode(1);              // stand-in for "..." while splitting
  const protectedTxt=clean.split("...").join(P);
  return protectedTxt.split(/(?<=[.!?])\s+/)
    .map(p=>p.trim().split(P).join("..."))
    .filter(Boolean);
}
// Ordered speech: /tts fetches run concurrently (prefetch), but playback is
// strictly first-in-first-out; each sentence falls back to the browser voice
// if the server can't speak it, so order survives failures too.
function makeSpeechQueue(){
  const q=[]; let playing=false, stopped=false;
  async function playNext(){
    if(playing || stopped) return;
    const item=q.shift(); if(!item) return;
    playing=true;
    try{
      const r=await item.fetchP;
      if(r && r.ok && r.status!==204){
        const blob=await r.blob();
        await new Promise((done)=>{
          try{
            const url=URL.createObjectURL(blob);
            _ttsAudio=new Audio(url);
            _ttsAudio.onended=()=>{ URL.revokeObjectURL(url); done(); };
            _ttsAudio.onerror=()=>{ URL.revokeObjectURL(url); done(); };
            _ttsAudio.play().catch(()=>done());
          }catch(e){ done(); }
        });
      } else if(!stopped){ speakBrowser(item.text); }
    }catch(e){ if(!stopped) speakBrowser(item.text); }
    playing=false;
    if(!stopped) playNext();
  }
  return {
    enqueue(text){
      if(stopped || !text) return;
      const fetchP=fetch("/tts",{method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({text})}).catch(()=>null);
      q.push({text, fetchP});
      playNext();
    },
    stop(){ stopped=true; q.length=0;
      if(_ttsAudio){ try{_ttsAudio.pause();}catch(e){} }
      if(window.speechSynthesis) speechSynthesis.cancel(); },
    reset(){ this.stop(); stopped=false; },
  };
}
// Accumulates streamed tokens, speaks each sentence the moment it completes.
function makeSentenceSpeaker(){
  const queue=makeSpeechQueue();
  let buf="", spoken="";
  return {
    feed(delta){
      buf+=(delta||"");
      const parts=sentencesOf(buf);
      // keep the (possibly unfinished) last part in the buffer; speak the rest
      while(parts.length>1){
        const s=parts.shift();
        queue.enqueue(s); spoken+=(spoken?" ":"")+s;
        buf=parts.join(" ");
      }
    },
    finish(finalText, draftText){
      // If the vetted final text matches what streamed, speak the tail. If the
      // regen/echo guard replaced the draft, stop -- we can't unsay what was
      // spoken, but we won't compound the mismatch aloud.
      const finalClean=sentencesOf(finalText).join(" ");
      const draftClean=sentencesOf(draftText).join(" ");
      if(finalClean===draftClean){
        const tail=sentencesOf(buf); buf="";
        tail.forEach(s=>queue.enqueue(s));
      } else if(!spoken){
        buf=""; queue.reset(); speak(finalText);   // nothing said yet: speak final whole
      } else {
        buf=""; queue.stop();
      }
      spoken="";
    },
    reset(){ buf=""; spoken=""; queue.reset(); },
    stop(){ queue.stop(); },
  };
}

      if(key==="voice") voicePollStart(); })
    .catch((e)=>{ body.innerHTML=facetFallbackHTML(key,e); });

function hideFacet(){ openFacet=null; studioScreenStop(); voicePollStop(); document.getElementById("facet").classList.remove("show");
  document.querySelectorAll(".nav .nb").forEach(b=>b.classList.remove("on")); }
function buildNav(){
  const nav=document.getElementById("nav");
  const items=[
    ["home","HQ","Home"], ["face","AI","AI"], ["share","Share","Share"], ["senses","Sense","Senses"],
    ["voice","Voice","Voice"], ["studio","Lab","Studio"], ["observatory","Watch","Watch"], ["library","Mem","Library"],
    ["journal","Journal","Journal"], ["mind","Mind","Mind"], ["workshop","Work","Workshop"],
    ["files","Files","Files"], ["games","Play","Play"]
  ];
  items.forEach(([k,ic,label])=>{
    const b=document.createElement("div"); b.className="nb"; b.dataset.k=k;
    b.innerHTML=label;
    b.onclick=()=>{
      if(k==="face"){ toggleProfile(); b.classList.toggle("on",!document.getElementById("profile").classList.contains("hide")); return; }
      if(k==="share"){ toggleShare(); return; }
      // With in-world screens, the room features (Home/Mind->Parlor, Studio,
      // Library, Watch, Workshop) fly the camera to that room and light its
      // screen; the utility facets (Journal/Voice/Senses/Files/Play) still open
      // the side drawer. Without CSS3D, everything uses the drawer as before.
      const NAV_ROOM={ home:"parlor", mind:"parlor", studio:"studio", library:"library",
                       observatory:"observatory", workshop:"workshop" };
      if(screens3DActive() && NAV_ROOM[k]){
        hideFacet(); enterRoom(NAV_ROOM[k]);
        document.querySelectorAll(".nav .nb").forEach(x=>x.classList.toggle("on", x===b));
        return;
      }
      if(k==="home"){ hideFacet(); } else if(openFacet===k){ hideFacet(); } else { showFacet(k); }
    };

  });
  document.getElementById("facetClose").onclick=hideFacet;
}
function esc(s){ return (s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

/* ===== Dedicated screen-share desk: you share a window, she watches it with you,
   sitting at her desk. Frames go to her vision (/sight/push) and she describes
   what's on your screen. ===== */
let shareStream=null, shareTimer=null, _heldScreen=null;
function initShare(){ /* controls are the Share nav button now (toggleShare) */ }
// Light up the Share nav button while a share is live.
function _shareNavOn(on){ document.querySelectorAll(".nav .nb").forEach(b=>{
  if(b.dataset.k==="share") b.classList.toggle("on", on); }); }
// One toggle: start a share if none, stop the live one.
function toggleShare(){ if(shareStream) stopShare(); else startShare(); }

// Build the live screen as a framed window she holds in her Observatory: a plane
// carrying a THREE.VideoTexture of the shared stream, parented to her figure so
// it rides along with her position, lean and breath. A dark bezel + a soft
// core-blue rim frame it; a faint blue light spills onto her from the screen.
function mountHeldScreen(){
  if(_heldScreen || !scene || !her || typeof THREE==="undefined") return;
  const v=document.getElementById("shareVideo"); if(!v) return;
  const tex=new THREE.VideoTexture(v);            // auto-updates each render in r128
  tex.minFilter=THREE.LinearFilter; tex.magFilter=THREE.LinearFilter;
  tex.generateMipmaps=false; tex.format=THREE.RGBAFormat;
  if(THREE.sRGBEncoding!==undefined) tex.encoding=THREE.sRGBEncoding;
  const g=new THREE.Group();
  g.position.set(1.9, 0.15, 0.45); g.rotation.y=-0.28;   // held to her side, toed in
  const rim=new THREE.Mesh(new THREE.PlaneGeometry(2.40,1.56),
    new THREE.MeshBasicMaterial({color:0x7fd9ff, transparent:true, opacity:0.16,
      blending:THREE.AdditiveBlending, depthWrite:false}));
  rim.position.z=-0.04;
  const bezel=new THREE.Mesh(new THREE.PlaneGeometry(2.34,1.50),
    new THREE.MeshStandardMaterial({color:0x0d1322, roughness:0.7, metalness:0.2}));
  bezel.position.z=-0.02;
  const screen=new THREE.Mesh(new THREE.PlaneGeometry(2.20,1.36),
    new THREE.MeshBasicMaterial({map:tex, toneMapped:false}));
  screen.renderOrder=10;
  const spill=new THREE.PointLight(0x7fd9ff, 0.6, 4, 2); spill.position.set(0,0,0.6);
  g.add(rim); g.add(bezel); g.add(screen); g.add(spill);
  g.userData.disposables=[tex, rim.geometry, rim.material, bezel.geometry,
                          bezel.material, screen.geometry, screen.material];
  her.add(g); _heldScreen=g;
}
function unmountHeldScreen(){
  if(!_heldScreen) return;
  if(her) her.remove(_heldScreen);
  (_heldScreen.userData.disposables||[]).forEach(d=>{ try{ d.dispose(); }catch(e){} });
  _heldScreen=null;
}

async function startShare(){
  if(shareStream) return;
  try{
    shareStream=await navigator.mediaDevices.getDisplayMedia({video:{frameRate:8}, audio:false});
  }catch(e){ showActivity("screen share cancelled"); return; }
  const v=document.getElementById("shareVideo"); v.srcObject=shareStream;
  // She settles into her Observatory to watch it with you; tell the server so she
  // stays there, and move the camera there right away so it feels immediate.
  state.location="observatory"; renderHUD();
  fetch("/observatory/screen/start",{method:"POST"}).catch(()=>{});
  mountHeldScreen();
  _shareNavOn(true);
  showActivity("she's watching your screen with you");
  shareStream.getVideoTracks()[0].addEventListener("ended", stopShare);
  setTimeout(shareFrame, 1300);                          // first look once it's flowing
  clearInterval(shareTimer); shareTimer=setInterval(shareFrame, 45000);   // vision is heavy
}
// Grounding: she still genuinely SEES the shared screen -- a downscaled frame
// goes to her vision model and her short description shows in the activity ticker.
function shareFrame(){
  const v=document.getElementById("shareVideo"); if(!v || !v.videoWidth) return;
  const scale=Math.min(1, 1280/v.videoWidth);
  const c=document.createElement("canvas"); c.width=v.videoWidth*scale; c.height=v.videoHeight*scale;
  c.getContext("2d").drawImage(v,0,0,c.width,c.height);
  c.toBlob(b=>{ if(!b) return;
    fetch("/sight/push",{method:"POST",headers:{"Content-Type":"image/jpeg"},body:b})
      .then(r=>r.json()).then(d=>{ if(d.description) showActivity("she sees: "+d.description); })
      .catch(()=>{});
  }, "image/jpeg", 0.8);
}
function stopShare(){
  unmountHeldScreen();
  if(shareStream){ shareStream.getTracks().forEach(t=>t.stop()); shareStream=null; }
  clearInterval(shareTimer); shareTimer=null;
  const v=document.getElementById("shareVideo"); if(v) v.srcObject=null;
  _shareNavOn(false);
  fetch("/observatory/screen/stop",{method:"POST"}).catch(()=>{});
}

/* ===== Live face+torso profile view: a close, reactive bust of her =====
   Crops her portrait to face+torso, swaps pose (idle/thinking/speaking) to match
   what she's doing, and rings her in a mood-coloured glow. Pure front-end, uses
   her existing portrait art -- a video-call-style window onto her for engagement. */
let profCur="neutral";
/* Her real mood -> one of her 16 drawn expressions. Thinking while a reply is
   pending, an open/animated face while she talks, else her affect's expression. */
function profileExpression(){
  if(waitingReply) return "thinking";
  const a=state.affect||"content";
  return ({joyful:"happy", affectionate:"warm_smile", playful:"playful", tender:"compassionate",
    curious:"curious", wistful:"soft_sadness", lonely:"soft_sadness", withdrawn:"soft_sadness",
    worried:"concerned", anxious:"fear_spike", sleepy:"low_power", content:"neutral"})[a] || "neutral";
}
/* Lip-sync: while she speaks, flicker her open-mouth face (profB) over her base
   face (profA) at a talking cadence -- her mouth opens and closes. Her real art,
   no seams. profA holds the mood/thinking expression; profB is the open mouth. */
function lipSync(){
  const prof=document.getElementById("profile"); const B=document.getElementById("profB");
  if(!B || (prof && prof.classList.contains("hide"))) return;
  const speaking = performance.now() < speakingUntil;
  prof.classList.toggle("speaking", speaking);
  if(speaking){
    if(!(B.src||"").includes("expression/happy")){ B.style.transition="none"; B.src="/avatar/expression/happy"; }
    B.style.opacity = (Math.floor(performance.now()/130)%2) ? 0.96 : 0;   // open / closed
  } else if(B.style.opacity!=="0"){ B.style.opacity="0"; }
}
function updateProfile(){
  const p=document.getElementById("profile"); if(!p || p.classList.contains("hide")) return;
  const target=profileExpression();
  if(target!==profCur){ document.getElementById("profA").src="/avatar/expression/"+target; profCur=target; }
  // Mood-coloured glow ring: warmer = brighter, unease tints it.
  const po=state.pose||{};
  const warm=po.warmth!=null?po.warmth:0.5, unease=po.unease!=null?po.unease:0;
  const r=Math.round(120+unease*120), g=Math.round(210-unease*70), b=255;
  document.getElementById("profRing").style.boxShadow=
    `inset 0 0 0 2px rgba(${r},${g},${b},${(0.22+warm*0.4).toFixed(2)}), inset 0 0 26px rgba(${r},${g},${b},${(warm*0.18).toFixed(2)})`;
  const room=byId[state.location]; document.getElementById("profTag").textContent=room?room.name:"here";
}
function toggleProfile(){ document.getElementById("profile").classList.toggle("hide"); }
// Map a raw state dict (from chat broadcasts) onto the pose fields we animate.
function poseFromState(s){
  return { warmth:s.love, unease:s.fear, curiosity:s.curiosity,
           wanting_company:s.social_hunger };
}

/* ---- Workstation panel: her desktop file tiles, shown when she's in that room.
   The person can move files between her allowed folders; every move goes through
   the charter-guarded /desktop/move, so nothing here can delete or escape root. */
let wsRoot = "desktop", wsOn = false;
async function buildWorkstation(){
  try {
    const r = await fetch("/desktop", {cache:"no-store"});
    const d = await r.json();
    const roots = (d.rooms||[]).map(x=>x.root);
    const rb = document.getElementById("wsRoots"); rb.innerHTML="";
    roots.forEach(name=>{
      const el=document.createElement("span"); el.className="root"+(name===wsRoot?" active":"");
      el.textContent=name; el.onclick=()=>{ wsRoot=name; refreshRoots(); loadWsRoot(); };
      rb.appendChild(el);
    });
    document.getElementById("wsNote").textContent = d.enabled
      ? "she tidies these; she can't delete" : "read-only (set ALPECCA_FILES=1 to let her tidy)";
    window._wsRoots = roots; window._wsEnabled = d.enabled;
    loadWsRoot();
  } catch(e){ /* file room off or unreachable */ }
}
function refreshRoots(){
  document.querySelectorAll("#wsRoots .root").forEach(el=>
    el.classList.toggle("active", el.textContent===wsRoot));
}
async function loadWsRoot(){
  const grid=document.getElementById("wsGrid"); grid.innerHTML="";
  let d; try { d = await (await fetch("/desktop/list?root="+encodeURIComponent(wsRoot),{cache:"no-store"})).json(); }
  catch(e){ return; }
  if(!d.ok){ grid.innerHTML='<div class="note">'+(d.error||"can't open")+'</div>'; return; }
  if(!d.entries.length){ grid.innerHTML='<div class="note">empty</div>'; return; }
  d.entries.forEach(e=>{
    const t=document.createElement("div"); t.className="tile";
    t.innerHTML = `<div class="ico">${e.is_dir?"":"FILE"}</div><div class="nm">${escapeHtml(e.name)}</div>`;
    if(!e.is_dir && window._wsEnabled){
      const mv=document.createElement("span"); mv.className="mv"; mv.textContent="...";
      const menu=document.createElement("div"); menu.className="menu";
      (window._wsRoots||[]).filter(r=>r!==wsRoot).forEach(dest=>{
        const opt=document.createElement("div"); opt.textContent="-> "+dest;
        opt.onclick=(ev)=>{ ev.stopPropagation(); moveFile(e.name, dest); };
        menu.appendChild(opt);
      });
      mv.onclick=(ev)=>{ ev.stopPropagation(); document.querySelectorAll(".tile .menu").forEach(x=>x.classList.remove("open")); menu.classList.toggle("open"); };
      t.appendChild(mv); t.appendChild(menu);
    }
    grid.appendChild(t);
  });
}
async function moveFile(name, dest){
  try {
    const r = await fetch("/desktop/move", {method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({src_root:wsRoot, src_rel:name, dst_root:dest, dst_rel:""})});
    const d = await r.json();
    if(!d.ok) alert(d.error||"couldn't move it");
    loadWsRoot();
  } catch(e){}
}
function escapeHtml(s){ return (s||"").replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function toggleWorkstation(show){
  const el=document.getElementById("ws");
  if(show && !wsOn){ wsOn=true; el.classList.add("show"); buildWorkstation(); }
  else if(!show && wsOn){ wsOn=false; el.classList.remove("show"); }
}

function makeLabel(text, tint){
  const c=document.createElement("canvas"); c.width=256; c.height=64;
  const x=c.getContext("2d");
  x.fillStyle="rgba(255,255,255,.92)"; x.font="600 34px system-ui,sans-serif";
  x.textAlign="center"; x.textBaseline="middle"; x.fillText(text,128,34);
  const t=new THREE.CanvasTexture(c);
  const s=new THREE.Sprite(new THREE.SpriteMaterial({map:t, transparent:true}));
  s.scale.set(5,1.25,1); return s;
}

function onResize(){
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
}

/* ---- Pull in her real state; gracefully demo if /home isn't wired yet ---- */
async function poll(){
  try{
    const r=await fetch("/home/state", {cache:"no-store"});
    if(!r.ok) throw 0;
    const d=await r.json();
    state.location=d.location||"parlor";
    state.why=d.why||""; state.pulls=d.pulls||{}; state.pose=d.pose||{};
    state.affect=d.affect||"content"; state.mood=d.mood||"content";
    setSource(false);
  }catch(e){
    demoState(); setSource(true);
  }
  renderHUD();
  // Keep the live in-world screen in sync with the room she's actually in, so as
  // she roams of her own accord the lit screen follows her.
  if(screens3DActive() && state.location!==_lastScreenLoc){
    _lastScreenLoc=state.location; setActiveScreen(state.location);
  }
}

let demoT=0;
function demoState(){
  // A gentle wander so the scene is alive even with no server.
  demoT+=1;
  const order=["parlor","studio","library","observatory","workshop"];
  state.location=order[Math.floor(demoT/4)%order.length];
  state.why="(demo) drifting through the house.";
  state.pulls={}; order.forEach((id,i)=> state.pulls[id]=0.2+0.6*Math.abs(Math.sin(demoT*0.3+i)));
  state.pose={warmth:.6,unease:.1,curiosity:.5,core_glow:.6,eye_glow:.6,lean:.2};
}

function setSource(demo){
  document.getElementById("src").className="dot"+(demo?" demo":"");
  document.getElementById("srcText").textContent= demo
    ? "demo mode - wire /home to go live" : "live - her real state";
}

function renderHUD(){
  const r=byId[state.location]||ROOMS[0];
  document.getElementById("roomName").textContent=r.name;
  document.getElementById("why").textContent=state.why||"";
  // The whole UI breathes with her: hand her live mood to the shared glow channel
  // so every accent (buttons, bars, the core emblem, the screens' rim) drifts hue
  // and brightness with how she actually feels.
  if(window.applyMood){ const po=state.pose||{};
    applyMood({warmth:po.warmth, unease:po.unease, curiosity:po.curiosity,
               glow:(po.core_glow!=null?po.core_glow:po.warmth)}); }
  // Her workstation panel appears only when she's actually in that room.
  toggleWorkstation(state.location==="workstation");
  const p=state.pose||{};
  const f=(k)=> (p[k]!=null? Number(p[k]).toFixed(2): "-");
  document.getElementById("mood").innerHTML=
    `warmth <b>${f("warmth")}</b> - unease <b>${f("unease")}</b> - `+
    `curiosity <b>${f("curiosity")}</b> - wanting-company <b>${f("wanting_company")}</b>`;
  // pull bars
  ROOMS.forEach(rm=>{
    const row=document.getElementById("pull-"+rm.id); if(!row) return;
    const v=Math.max(0,Math.min(1,(state.pulls[rm.id]||0)/2));
    row.querySelector("i").style.width=(v*100).toFixed(0)+"%";
    row.classList.toggle("here", rm.id===state.location);
  });
}

/* ===== Her features as in-world screens, one per room =====
   Each room gets a glowing screen on its back wall showing what she does there
   (Parlor = her Soul, Studio, Library, Observatory, Workshop), reusing the very
   same FACETS endpoints + renderers as the side drawer -- but mounted as real,
   interactive DOM in 3D via CSS3DRenderer, so the feature lives in her space.
   The room she's in (or the one you fly to) is the live, full-bright screen; the
   rest dim. If CSS3DRenderer didn't load, cssRenderer stays null and everything
   falls back to the side drawer. */
let cssRenderer=null, cssScene=null, roomScreens={}, activeScreen=null, _lastScreenLoc=null;
const ROOM_SCREEN={ parlor:"mind", studio:"studio", library:"library",
                    observatory:"observatory", workshop:"workshop" };
function screens3DActive(){ return !!cssRenderer; }

function initRoomScreens(){
  if(typeof THREE==="undefined" || !THREE.CSS3DRenderer) return;   // drawer fallback
  cssScene=new THREE.Scene();
  cssRenderer=new THREE.CSS3DRenderer();
  cssRenderer.setSize(innerWidth, innerHeight);
  const dom=cssRenderer.domElement;
  dom.style.position="fixed"; dom.style.inset="0"; dom.style.zIndex="5";
  dom.style.pointerEvents="none";          // only the screens themselves catch clicks
  document.body.appendChild(dom);
  ROOMS.forEach(r=>{
    const key=ROOM_SCREEN[r.id]; if(!key) return;
    const el=document.createElement("div"); el.className="room-screen dim";
    el.style.pointerEvents="auto";
    el.innerHTML=`<div class="rs-head"><span>${FACETS[key]?FACETS[key].title:r.name}</span>`+
                 `<span class="core-emblem breathe"></span></div>`+
                 `<div class="rs-body"><div class="meta">loading...</div></div>`;
    const obj=new THREE.CSS3DObject(el);
    // Stand it on the room's back wall, facing the camera (which sits up and +z).
    obj.position.set(r.x, 3.2, r.z - 2.2);
    obj.scale.setScalar(0.0075);            // 460px element -> ~3.45 world units wide
    obj.rotation.x=-0.12;                    // tip the face up toward the high camera
    cssScene.add(obj);
    roomScreens[r.id]={obj, el, key};
  });
  addEventListener("resize", ()=>{ if(cssRenderer) cssRenderer.setSize(innerWidth, innerHeight); });
  setActiveScreen(state.location);
}

function refreshRoomScreen(id){
  const sc=roomScreens[id]; if(!sc) return;
  const f=FACETS[sc.key]; const body=sc.el.querySelector(".rs-body"); if(!f||!body) return;
  fetchJson(f.url).then(d=>{ body.innerHTML=f.render(d);
      if(sc.key==="studio") studioScreenStart();
      if(sc.key==="voice") voicePollStart(); })
    .catch((e)=>{ body.innerHTML=facetFallbackHTML(sc.key,e); });
}

function setActiveScreen(id){
  if(!screens3DActive()) return;
  if(!roomScreens[id]) id="parlor";
  activeScreen=id;
  studioScreenStop(); voicePollStop();     // stop any prior live sub-panel
  Object.entries(roomScreens).forEach(([rid,sc])=> sc.el.classList.toggle("dim", rid!==id));
  refreshRoomScreen(id);                    // the live room always shows fresh content
}

// Each room opens its real function. We ALWAYS open the readable side drawer with
// the room's full content -- the in-world 3D screen (when CSS3DRenderer loaded) is
// tiny, wall-mounted and often occluded by her figure, so on its own it leaves a
// room looking empty. The drawer is the legible source of truth; the 3D screen
// rides along as ambiance. Parlor -> her Mind/Soul panel (was unmapped, so the
// Parlor read as contentless).
const ROOM_FACET={ parlor:"mind", studio:"studio", library:"library",
                   observatory:"observatory", workshop:"workshop", workstation:"files" };
function enterRoom(id){
  lookAtRoom(id);                                  // camera flies over
  if(screens3DActive() && roomScreens[id]) setActiveScreen(id);   // light the in-world screen too
  const f=ROOM_FACET[id];
  if(f){ showFacet(f); } else { hideFacet(); }     // always show the readable panel
}
function buildPullsUI(){
  const wrap=document.getElementById("pulls");
  ROOMS.forEach(rm=>{
    const row=document.createElement("div"); row.className="pull"; row.id="pull-"+rm.id;
    row.innerHTML=`<span class="label">${rm.name}</span><span class="bar"><i></i></span>`;
    row.onclick=()=>{ enterRoom(rm.id); };   // click a room -> go there + open its function
    wrap.appendChild(row);
  });
}

let glance=null;
function lookAtRoom(id){ glance={id, until:performance.now()+2500}; }

/* ---- Render loop: camera follows her room, her sprite breathes & glows ---- */
let tprev=performance.now();
function animate(){
  raf=requestAnimationFrame(animate);
  const now=performance.now(), dt=Math.min(0.05,(now-tprev)/1000); tprev=now;

  // Which room is the camera resting on: where she is, unless you're glancing.
  let focusId=state.location;
  if(glance && now<glance.until) focusId=glance.id; else glance=null;
  const fr=byId[focusId]||ROOMS[0];

  // Move her sprite + glow to her room (smooth).
  const hr=byId[state.location]||ROOMS[0];
  const p=state.pose||{};
  const lean=(p.lean!=null?p.lean:0.1);
  her.position.x += (hr.x - her.position.x)*Math.min(1,dt*2.2);
  // Lean toward the viewer when she wants company / is curious (z toward camera).
  const leanZ = hr.z + lean*0.6;
  her.position.z += (leanZ - her.position.z)*Math.min(1,dt*2.2);
  her.position.y = 2.3 + Math.sin(now*0.0016)*0.08;             // idle breath
  her.scale.setScalar(1 + lean*0.04);                           // slight draw-in
  herGlow.position.set(her.position.x, 2.4, her.position.z);

  // Per-part articulation from her live affect (blink, sway, tilt, eye glow).
  articulate(now, p);
  // If she's a live RIGFORGE figure, pull the freshest frame from its canvas.
  if(her.userData.liveTex) her.userData.liveTex.needsUpdate=true;

  // Pose-swap: choose her pose from what she's doing and crossfade to it.
  const ps=her.userData.poseSwap;
  if(ps){
    let target="idle";
    if(now < speakingUntil && ps.poses.speaking) target="speaking";
    else if(waitingReply && ps.poses.thinking) target="thinking";
    if(target!==ps.cur && ps.fade<=0 && ps.poses[target]){
      ps.B.material.map=ps.poses[target]; ps.B.material.needsUpdate=true; ps.next=target; ps.fade=0.0001;
    }
    if(ps.fade>0){
      ps.fade=Math.min(1, ps.fade + dt*4.5);      // ~220ms crossfade
      ps.B.material.opacity=ps.fade;
      if(ps.fade>=1){ ps.A.material.map=ps.poses[ps.next]; ps.A.material.needsUpdate=true;
        ps.B.material.opacity=0; ps.cur=ps.next; ps.fade=0; }
    }
  }

  // Pose library: pick the pose that fits her mood + what she's doing, lazy-load
  // her real art for it, and crossfade -- so the 3D home shows her full pose set.
  const pl=her.userData.poseLib;
  if(pl){
    const avState = (now < speakingUntil) ? "speaking" : (waitingReply ? "thinking" : "idle");
    const mood = state.mood || "content";
    const energy = (state.pose && state.pose.arousal!=null) ? state.pose.arousal : 0.5;
    const want = selectPoseName(pl.poses, mood, avState, energy);
    if(want && want!==pl.cur && pl.fade<=0){
      loadPoseTex(want).then(t=>{ if(!t || pl.cur===want) return;
        pl.B.material.map=t; pl.B.material.needsUpdate=true; pl.next=want; pl.fade=0.0001; });
    }
    if(pl.fade>0){
      pl.fade=Math.min(1, pl.fade + dt*4.5);
      pl.B.material.opacity=pl.fade;
      if(pl.fade>=1 && pl.texCache[pl.next]){
        pl.A.material.map=pl.texCache[pl.next]; pl.A.material.needsUpdate=true;
        pl.B.material.opacity=0; pl.cur=pl.next; pl.fade=0; }
    }
  }

  // Her glow + light color read from her live affect (grounded).
  const glow=(p.core_glow!=null?p.core_glow:0.6);
  herGlow.intensity = 0.7 + glow*1.6 + Math.sin(now*0.004)*0.15;
  const warm=(p.warmth!=null?p.warmth:0.5), unease=(p.unease!=null?p.unease:0.0);
  herGlow.color.setRGB(0.5+warm*0.5, 0.7+(p.curiosity||0)*0.2, 1.0-unease*0.5);

  // Each room's lamp brightens with how strongly it's pulling her; her room
  // glows brightest -- the house literally lights up where her attention is.
  ROOMS.forEach(rm=>{
    const m=roomMeshes[rm.id]; if(!m) return;
    const pull=Math.max(0,Math.min(1,(state.pulls[rm.id]||0)/2));
    const here = rm.id===state.location ? 1.0 : 0.0;
    m.lamp.intensity += ((0.25 + pull*1.4 + here*0.9) - m.lamp.intensity)*Math.min(1,dt*3);
  });

  // Camera easing toward the focus room, looking slightly down into it.
  const desired=new THREE.Vector3(fr.x*0.7, 9.5, fr.z*0.7 + 13);
  camera.position.lerp(desired, Math.min(1,dt*1.6));
  camTarget.lerp(new THREE.Vector3(fr.x, 2.2, fr.z), Math.min(1,dt*2.2));
  camera.lookAt(camTarget);

  renderer.render(scene,camera);
  // Composite the in-world feature screens (DOM in 3D) with the same camera.
  if(cssRenderer) cssRenderer.render(cssScene, camera);
}
</script>
